<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPI Tracker — Project Portfolio</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3250;
    --accent: #4f7ef8;
    --accent2: #7c5cfc;
    --green: #22c55e;
    --yellow: #f59e0b;
    --red: #ef4444;
    --text: #e2e8f0;
    --muted: #7c8db5;
    --heading: #fff;
    --radius: 10px;
    --font: 'Inter', system-ui, sans-serif;
  }
  [data-theme="light"] {
    --bg: #f0f2f5;
    --surface: #ffffff;
    --surface2: #f0f2f5;
    --border: #d8dce6;
    --accent: #4f7ef8;
    --accent2: #7c5cfc;
    --green: #16a34a;
    --yellow: #d97706;
    --red: #dc2626;
    --text: #1e293b;
    --muted: #64748b;
    --heading: #0f172a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; font-size: 13px; }

  /* ── Sidebar ── */
  #sidebar { width: 220px; min-width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-logo { padding: 18px 16px 14px; border-bottom: 1px solid var(--border); }
  .sidebar-logo h1 { font-size: 15px; font-weight: 700; color: var(--heading); }
  .sidebar-logo span { color: var(--accent); }
  .sidebar-section-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); padding: 14px 16px 6px; }
  .sidebar-projects { flex: 1; overflow-y: auto; padding-bottom: 8px; }
  .sidebar-item { display: flex; align-items: center; gap: 10px; padding: 8px 16px; cursor: pointer; transition: background 0.15s; color: var(--muted); font-size: 13px; }
  .sidebar-item:hover { background: var(--surface2); color: var(--text); }
  .sidebar-item.active { background: rgba(79,126,248,0.12); color: var(--accent); border-right: 2px solid var(--accent); }
  .sidebar-item .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .sidebar-item .pgm-label { font-size: 10px; color: var(--muted); margin-left: auto; }
  .sidebar-bottom { padding: 12px 16px; border-top: 1px solid var(--border); }
  .btn-new-project { width: 100%; padding: 8px; background: var(--accent); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; transition: opacity 0.15s; }
  .btn-new-project:hover { opacity: 0.85; }

  /* ── Main ── */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* ── Top bar ── */
  #topbar { height: 52px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 8px; background: var(--surface); flex-shrink: 0; }
  .tab-btn { padding: 5px 13px; border-radius: 6px; border: 1px solid transparent; background: none; color: var(--muted); cursor: pointer; font-size: 12px; font-weight: 500; transition: all 0.15s; white-space: nowrap; }
  .tab-btn:hover { background: var(--surface2); color: var(--text); }
  .tab-btn.active { background: var(--surface2); color: var(--text); border-color: var(--border); }
  .topbar-title { font-size: 15px; font-weight: 700; color: var(--heading); white-space: nowrap; }
  .topbar-spacer { flex: 1; }
  .btn-action { padding: 6px 13px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); cursor: pointer; font-size: 12px; font-weight: 500; transition: all 0.15s; white-space: nowrap; }
  .btn-action:hover { border-color: var(--accent); color: var(--accent); }
  .btn-action.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-action.primary:hover { opacity: 0.85; }
  .btn-action.danger { background: rgba(239,68,68,0.12); border-color: #ef4444; color: #f87171; }

  /* ── Content ── */
  #content { flex: 1; overflow: auto; padding: 24px; }

  /* ── Status badges ── */
  .status-badge { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
  .status-badge.open { background: rgba(59,130,246,0.15); color: #60a5fa; }
  .status-badge.inprogress { background: rgba(245,158,11,0.15); color: #fbbf24; }
  .status-badge.done { background: rgba(34,197,94,0.15); color: #4ade80; }
  .status-badge.blocked { background: rgba(239,68,68,0.15); color: #f87171; }
  .status-badge.resolved { background: rgba(34,197,94,0.15); color: #4ade80; }
  .status-badge.investigating { background: rgba(168,85,247,0.15); color: #c084fc; }

  /* ── Severity badges ── */
  .sev-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; text-transform: uppercase; }
  .sev-badge.critical { background: rgba(239,68,68,0.2); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
  .sev-badge.high { background: rgba(245,158,11,0.2); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
  .sev-badge.medium { background: rgba(59,130,246,0.2); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }
  .sev-badge.low { background: rgba(100,116,139,0.2); color: #94a3b8; border: 1px solid rgba(100,116,139,0.3); }

  /* ── Portfolio ── */
  .progress-bar { height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 3px; }
  .npi-table { width: 100%; border-collapse: collapse; margin-bottom: 32px; }
  .npi-table th { padding: 8px 12px; text-align: left; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); border-bottom: 2px solid var(--border); white-space: nowrap; background: var(--surface); }
  .npi-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .npi-table tbody tr:hover td { background: var(--surface2); }
  .npi-table .proj-name { font-weight: 700; font-size: 13px; color: var(--heading); cursor: pointer; }
  .npi-table .proj-name:hover { color: var(--accent); text-decoration: underline; }
  .npi-table .proj-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .stage-pill { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; }
  .stage-pill.completed { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
  .stage-pill.in-progress { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
  .stage-pill.planned { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }
  .stage-pill.on-hold { background: rgba(148,163,184,0.12); color: #94a3b8; border: 1px solid rgba(148,163,184,0.3); }
  .qty-badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 4px; background: var(--surface2); color: var(--muted); border: 1px solid var(--border); margin-right: 4px; }
  .qty-badge.active { background: rgba(79,126,248,0.12); color: var(--accent); border-color: rgba(79,126,248,0.3); }
  .btn-issues { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 6px; border: 1px solid var(--border); background: none; cursor: pointer; color: var(--muted); transition: all 0.15s; }
  .btn-issues:hover { border-color: var(--accent); color: var(--accent); }
  .btn-issues.has-open { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.4); color: #f87171; }
  .btn-issues.has-critical { background: rgba(239,68,68,0.18); border-color: #ef4444; color: #f87171; font-weight: 700; }

  /* ── Stats ── */
  .stats-row { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px; flex: 1; min-width: 100px; }
  .stat-val { font-size: 24px; font-weight: 800; color: var(--heading); }
  .stat-val.blue { color: #60a5fa; }
  .stat-val.yellow { color: #fbbf24; }
  .stat-val.green { color: #4ade80; }
  .stat-val.red { color: #f87171; }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .section-header h2 { font-size: 18px; font-weight: 800; color: var(--heading); }

  /* ── Gantt ── */
  .gantt-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .gantt-container { display: flex; height: calc(100vh - 180px); }
  .gantt-left { width: 530px; min-width: 530px; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
  .gantt-right { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
  .gantt-header-row { display: flex; align-items: center; border-bottom: 1px solid var(--border); background: var(--surface2); flex-shrink: 0; }
  .gh-cell { padding: 8px 10px; font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; border-right: 1px solid var(--border); white-space: nowrap; }
  .gh-item { width: 36px; min-width: 36px; text-align: center; }
  .gh-task { flex: 1; }
  .gh-who { width: 80px; }
  .gh-dur { width: 46px; text-align: center; }
  .gh-status { width: 90px; }
  .gh-issues { width: 40px; text-align: center; }
  .timeline-header { display: flex; flex-shrink: 0; }
  .wk-header-cell { min-width: 80px; width: 80px; padding: 4px 2px; border-right: 1px solid var(--border); font-size: 9px; font-weight: 700; color: var(--muted); text-align: center; flex-shrink: 0; }
  .wk-header-cell.current { color: var(--accent); background: rgba(79,126,248,0.06); }
  .wk-date { font-size: 8px; color: var(--muted); opacity: 0.7; display: block; font-weight: 400; }
  .gantt-body { display: flex; flex: 1; overflow: hidden; }
  .gantt-tasks { width: 530px; min-width: 530px; overflow-y: auto; border-right: 1px solid var(--border); }
  .gantt-timeline-body { flex: 1; overflow: auto; }
  .task-row { display: flex; align-items: center; border-bottom: 1px solid var(--border); min-height: 36px; }
  .task-row:hover { background: rgba(79,126,248,0.04); }
  .task-row.section-row { background: var(--surface2); }
  .tc-cell { padding: 6px 10px; border-right: 1px solid var(--border); display: flex; align-items: center; font-size: 12px; }
  .tc-item { width: 36px; min-width: 36px; text-align: center; color: var(--muted); font-size: 11px; }
  .tc-task { flex: 1; }
  .tc-remark { font-size: 10px; color: var(--muted); margin-top: 1px; }
  .tc-who { width: 80px; }
  .who-pill { font-size: 10px; padding: 2px 6px; background: rgba(79,126,248,0.12); color: var(--accent); border-radius: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 70px; display: block; }
  .tc-dur { width: 46px; text-align: center; color: var(--muted); font-size: 11px; }
  .tc-status { width: 90px; }
  .tc-issues { width: 40px; text-align: center; }
  .issue-chip { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; border-radius: 50%; font-size: 9px; font-weight: 700; cursor: pointer; }
  .issue-chip.has-open { background: rgba(239,68,68,0.2); color: #f87171; border: 1px solid rgba(239,68,68,0.4); }
  .issue-chip.has-only-resolved { background: rgba(34,197,94,0.1); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
  .status-dot { display: flex; align-items: center; gap: 5px; font-size: 11px; }
  .status-dot::before { content: ''; width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .status-open .status-dot::before { background: #60a5fa; }
  .status-inprogress .status-dot::before { background: #fbbf24; }
  .status-done .status-dot::before { background: #4ade80; }
  .status-blocked .status-dot::before { background: #f87171; }
  .timeline-row { display: flex; min-height: 36px; border-bottom: 1px solid var(--border); position: relative; align-items: center; }
  .timeline-row.section-row { background: var(--surface2); }
  .wk-cell { min-width: 80px; width: 80px; height: 36px; border-right: 1px solid var(--border); flex-shrink: 0; }
  .wk-cell.current-wk { background: rgba(79,126,248,0.05); }
  .gantt-bar { position: absolute; height: 16px; top: 50%; transform: translateY(-50%); border-radius: 4px; display: flex; align-items: center; padding: 0 6px; font-size: 9px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; z-index: 2; cursor: pointer; transition: opacity 0.15s; }
  .gantt-bar:hover { opacity: 0.82; }
  .gantt-bar.open { background: linear-gradient(90deg,#3b82f6,#60a5fa); }
  .gantt-bar.inprogress { background: linear-gradient(90deg,#d97706,#f59e0b); }
  .gantt-bar.done { background: linear-gradient(90deg,#16a34a,#22c55e); }
  .gantt-bar.blocked { background: linear-gradient(90deg,#dc2626,#ef4444); }
  .gantt-bar .issue-flag { position: absolute; top: -5px; right: -3px; width: 10px; height: 10px; background: #ef4444; border-radius: 50%; border: 1px solid var(--bg); }
  .today-line { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--accent); opacity: 0.5; z-index: 10; pointer-events: none; }

  /* ── Team view ── */
  .team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
  .member-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; display: flex; flex-direction: column; gap: 8px; }
  .member-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .member-name { font-size: 14px; font-weight: 700; color: var(--heading); }
  .member-role { font-size: 11px; color: var(--muted); }
  .member-tasks { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .member-tasks strong { color: var(--text); }

  /* ── Issues view ── */
  .issue-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
  .issue-card.critical { border-left: 3px solid #ef4444; }
  .issue-card.high { border-left: 3px solid #f59e0b; }
  .issue-card.medium { border-left: 3px solid #3b82f6; }
  .issue-card.low { border-left: 3px solid #475569; }
  .issue-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
  .issue-title { font-size: 14px; font-weight: 600; color: var(--heading); }
  .issue-desc { font-size: 12px; color: var(--muted); margin-bottom: 10px; line-height: 1.5; }
  .issue-meta { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .issue-linked-tasks { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .linked-task-tag { font-size: 10px; padding: 2px 8px; background: rgba(79,126,248,0.12); color: var(--accent); border-radius: 4px; border: 1px solid rgba(79,126,248,0.2); cursor: pointer; }
  .linked-task-tag:hover { background: rgba(79,126,248,0.2); }
  .impact-tag { font-size: 10px; padding: 2px 8px; background: rgba(239,68,68,0.1); color: #f87171; border-radius: 4px; border: 1px solid rgba(239,68,68,0.2); }

  /* ── Build Stages ── */
  .stage-pipeline { display: flex; gap: 0; align-items: stretch; margin: 16px 0; position: relative; }
  .stage-pipeline::before { content: ''; position: absolute; top: 50%; left: 40px; right: 40px; height: 2px; background: var(--border); z-index: 0; }
  .stage-card { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; position: relative; z-index: 1; transition: border-color 0.15s; }
  .stage-card:hover { border-color: var(--accent); }
  .stage-card.completed { border-color: var(--green); }
  .stage-card.in-progress { border-color: var(--yellow); }
  .stage-card.on-hold { border-color: var(--red); }
  .stage-arrow { display: flex; align-items: center; justify-content: center; width: 32px; flex-shrink: 0; color: var(--muted); font-size: 18px; z-index: 1; }
  .stage-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .stage-name { font-size: 18px; font-weight: 800; color: var(--heading); }
  .stage-fullname { font-size: 11px; color: var(--muted); }
  .stage-status-badge { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
  .stage-status-badge.planned { background: rgba(59,130,246,0.15); color: #60a5fa; }
  .stage-status-badge.ready { background: rgba(168,85,247,0.15); color: #c084fc; }
  .stage-status-badge.in-progress { background: rgba(245,158,11,0.15); color: #fbbf24; }
  .stage-status-badge.completed { background: rgba(34,197,94,0.15); color: #4ade80; }
  .stage-status-badge.on-hold { background: rgba(239,68,68,0.15); color: #f87171; }
  .stage-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px; margin: 10px 0; font-size: 11px; color: var(--muted); }
  .stage-meta strong { color: var(--text); }
  .gate-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .gate-title { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
  .gate-item { display: flex; align-items: center; gap: 6px; font-size: 11px; margin-bottom: 4px; cursor: pointer; user-select: none; }
  .gate-check { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 9px; flex-shrink: 0; }
  .gate-check.checked { background: var(--green); border-color: var(--green); color: #fff; }
  .gate-bar { height: 4px; background: var(--surface2); border-radius: 2px; margin-top: 6px; overflow: hidden; }
  .gate-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
  .post-build { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .post-build-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .post-build-stat { text-align: center; }
  .post-build-stat .val { font-size: 18px; font-weight: 800; }
  .post-build-stat .lbl { font-size: 10px; color: var(--muted); }
  .approval-badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; }
  .approval-badge.approved { background: rgba(34,197,94,0.15); color: #4ade80; }
  .approval-badge.conditional { background: rgba(245,158,11,0.15); color: #fbbf24; }
  .approval-badge.rejected { background: rgba(239,68,68,0.15); color: #f87171; }
  .approval-badge.pending { background: rgba(100,116,139,0.15); color: #94a3b8; }

  /* ── Stage Badges & Filter ── */
  .stage-tag { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap; vertical-align: middle; margin-left: 4px; }
  .stage-tag.etb { background: rgba(59,130,246,0.15); color: #60a5fa; }
  .stage-tag.ps { background: rgba(245,158,11,0.15); color: #fbbf24; }
  .stage-tag.fas { background: rgba(34,197,94,0.15); color: #4ade80; }
  .stage-filter-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .stage-filter-bar label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .stage-filter-bar select { background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; font-size: 12px; outline: none; cursor: pointer; }
  .stage-filter-bar select:focus { border-color: var(--accent); }

  /* ── NRE ── */
  .po-badge { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
  .po-badge.no-po { background: rgba(239,68,68,0.15); color: #f87171; }
  .po-badge.po-requested { background: rgba(245,158,11,0.15); color: #fbbf24; }
  .po-badge.po-received { background: rgba(59,130,246,0.15); color: #60a5fa; }
  .po-badge.invoiced { background: rgba(168,85,247,0.15); color: #c084fc; }
  .po-badge.paid { background: rgba(34,197,94,0.15); color: #4ade80; }
  .nre-table { width: 100%; border-collapse: collapse; }
  .nre-table th { text-align: left; padding: 8px 12px; font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; background: var(--surface2); border-bottom: 1px solid var(--border); }
  .nre-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 12px; }
  .nre-table tr:hover { background: rgba(79,126,248,0.04); }
  .nre-category-row td { background: var(--surface2); padding: 8px 16px; font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; }
  .nre-cost { font-family: 'Inter', monospace; font-weight: 600; color: var(--text); }

  /* ── Modals ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 100; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
  .modal-overlay.hidden { display: none; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 540px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 18px; color: var(--heading); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1/-1; }
  .form-group label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .form-group input, .form-group select, .form-group textarea { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; color: var(--text); font-size: 13px; outline: none; font-family: inherit; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 60px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .checkbox-group { display: flex; flex-wrap: wrap; gap: 6px; }
  .checkbox-pill { display: flex; align-items: center; gap: 5px; padding: 4px 10px; border: 1px solid var(--border); border-radius: 20px; cursor: pointer; font-size: 11px; color: var(--muted); transition: all 0.15s; user-select: none; }
  .checkbox-pill:hover { border-color: var(--accent); color: var(--text); }
  .checkbox-pill.selected { background: rgba(79,126,248,0.15); border-color: var(--accent); color: var(--accent); }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .hidden { display: none !important; }

  /* ── Theme toggle ── */
  .theme-toggle { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--muted); transition: all 0.2s; flex-shrink: 0; }
  .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }
  .theme-toggle svg { width: 18px; height: 18px; }

  /* ── Hamburger ── */
  .hamburger { display: none; background: none; border: none; color: var(--text); cursor: pointer; padding: 6px; flex-shrink: 0; }
  .hamburger svg { width: 22px; height: 22px; }
  .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 49; }

  /* ── Responsive ── */
  @media (max-width: 1024px) {
    #sidebar { position: fixed; left: -260px; top: 0; bottom: 0; width: 250px; min-width: 250px; z-index: 50; transition: left 0.25s ease; }
    #sidebar.open { left: 0; }
    .sidebar-overlay.open { display: block; }
    .hamburger { display: flex; }
    .gantt-left, .gantt-tasks { width: 340px; min-width: 340px; }
    .tc-who, .gh-who { width: 60px; }
    .tc-dur, .gh-dur { width: 40px; }
    .tc-status, .gh-status { width: 75px; }
    #content { padding: 16px; }
    .stage-pipeline { flex-direction: column; }
    .stage-pipeline::before { display: none; }
    .stage-arrow { transform: rotate(90deg); width: auto; height: 24px; }
  }
  @media (max-width: 768px) {
    #topbar { height: auto; min-height: 48px; flex-wrap: wrap; padding: 8px 12px; gap: 6px; }
    #view-tabs { flex-wrap: wrap; gap: 4px !important; }
    .tab-btn { padding: 4px 9px; font-size: 11px; }
    .topbar-title { font-size: 13px; }
    .btn-action { padding: 5px 10px; font-size: 11px; }
    #content { padding: 12px; }
    .gantt-container { height: calc(100vh - 240px); }
    .gantt-left, .gantt-tasks { width: 260px; min-width: 260px; }
    .tc-who, .gh-who { display: none; }
    .tc-dur, .gh-dur { display: none; }
    .portfolio-grid { grid-template-columns: 1fr; }
    .stats-row { flex-direction: column; }
    .stat-card { min-width: unset; }
    .form-grid { grid-template-columns: 1fr; }
    .form-group.full { grid-column: 1; }
    .modal { width: 95vw; padding: 16px; }
    .section-header { flex-direction: column; align-items: flex-start; gap: 8px; }
    .team-grid { grid-template-columns: 1fr 1fr; }
    .stage-filter-bar { flex-wrap: wrap; }
    .post-build-grid { grid-template-columns: 1fr 1fr 1fr; gap: 4px; }
  }
  @media (max-width: 480px) {
    .gantt-left, .gantt-tasks { width: 200px; min-width: 200px; }
    .tc-issues, .gh-issues { display: none; }
    .team-grid { grid-template-columns: 1fr; }
    .card-meta { flex-direction: column; gap: 6px; }
    .issue-meta { flex-direction: column; gap: 6px; }
    .nre-table td, .nre-table th { padding: 6px 8px; font-size: 11px; }
  }
</style>
</head>

<!-- MAIN -->

<!-- TASK MODAL -->
<div class="modal-overlay hidden" id="task-modal">

    <h2 id="modal-task-title">Add Task</h2>

      <div class="form-group full"><label>Task Name</label><input type="text" id="f-name" placeholder="e.g. PCB Production"></div>
      <div class="form-group full"><label>Section / Category</label><input type="text" id="f-section" placeholder="e.g. Pre-requisite Activity - Main PCBA"></div>
      <div class="form-group full"><label>Remark / Notes</label><textarea id="f-remark" placeholder="Supplier info, dependencies, notes…"></textarea></div>
      <div class="form-group"><label>Assigned To</label><input type="text" id="f-who" placeholder="e.g. Axis, SVI"></div>
      <div class="form-group"><label>Duration (days)</label><input type="number" id="f-days" min="1"></div>
      <div class="form-group"><label>Start Date</label><input type="date" id="f-start"></div>
      <div class="form-group"><label>End Date</label><input type="date" id="f-end"></div>
      <div class="form-group"><label>Status</label>
        <select id="f-status">
          <option value="open">Open</option>
          <option value="inprogress">In Progress</option>
          <option value="done">Done</option>
          <option value="blocked">Blocked</option>
        </select>
      </div>
      <div class="form-group"><label>Build Stage</label>
        <select id="f-stage">
          <option value="">— None —</option>
          <option value="etb">ETB — External Test Build</option>
          <option value="ps">PS — Pre-Series Build</option>
          <option value="fas">FAS — First Article Sample</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-action" onclick="closeTaskModal()">Cancel</button>
      <button class="btn-action primary" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<!-- MEMBER MODAL -->
<div class="modal-overlay hidden" id="member-modal">

    <h2 id="modal-member-title">Add Team Member</h2>

    <div class="modal-actions">
      <button class="btn-action" onclick="closeMemberModal()">Cancel</button>
      <button class="btn-action primary" onclick="saveMember()">Save</button>
    </div>
  </div>
</div>

<!-- ISSUE MODAL -->
<div class="modal-overlay hidden" id="issue-modal">

    <h2 id="modal-issue-title">Add Issue</h2>

      <div class="form-group"><label>Severity</label>

          <option value="critical">Critical — blocks build/delivery</option>
          <option value="high">High — major delay risk</option>
          <option value="medium">Medium — manageable impact</option>
          <option value="low">Low — minor / cosmetic</option>
        </select>
      </div>
      <div class="form-group"><label>Status</label>
        <select id="i-status">
          <option value="open">Open</option>
          <option value="investigating">Investigating</option>
          <option value="resolved">Resolved</option>

      <div class="form-group"><label>Due Date</label><input type="date" id="i-due"></div>

          <option value="">— None —</option>
          <option value="etb">ETB</option>
          <option value="ps">PS</option>
          <option value="fas">FAS</option>

      </div>
    </div>
