// ══════════════════════════════════════════════════
//  THEME & SIDEBAR TOGGLE
// ══════════════════════════════════════════════════
function toggleTheme() {
  const html = document.documentElement;
  const isLight = html.getAttribute('data-theme') === 'light';
  html.setAttribute('data-theme', isLight ? 'dark' : 'light');
  localStorage.setItem('npi-theme', isLight ? 'dark' : 'light');
  updateThemeIcon();
}
function updateThemeIcon() {
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  document.getElementById('icon-sun').style.display = isLight ? 'block' : 'none';
  document.getElementById('icon-moon').style.display = isLight ? 'none' : 'block';
}
function applyStoredTheme() {
  const stored = localStorage.getItem('npi-theme');
  if (stored) document.documentElement.setAttribute('data-theme', stored);
  updateThemeIcon();
}
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}
function closeSidebarIfMobile() {
  if (window.innerWidth <= 1024) {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('open');
  }
}

// ══════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════
function init() { applyStoredTheme(); renderSidebar(); showPortfolio(); }

function renderSidebar() {
  document.getElementById('sidebar-projects').innerHTML = projects.map(p => {
    const openIssues = (p.issues || []).filter(i => i.status !== 'resolved').length;
    return `<div class="sidebar-item ${currentProject && currentProject.id === p.id ? 'active' : ''}" onclick="openProject('${p.id}')">
      <span class="dot" style="background:${p.color}"></span>
      <span style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}</span>
      ${openIssues ? `<span style="font-size:9px;background:rgba(239,68,68,0.2);color:#f87171;border-radius:10px;padding:1px 5px;font-weight:700">${openIssues}</span>` : ''}
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════════════
//  PORTFOLIO
// ══════════════════════════════════════════════════
function showPortfolio() {
  currentProject = null;
  closeSidebarIfMobile();
  document.getElementById('topbar-title').textContent = 'Portfolio Overview';
  document.getElementById('view-tabs').style.display = 'none';
  ['btn-add-task','btn-add-member','btn-add-issue','btn-add-nre'].forEach(id => document.getElementById(id).classList.add('hidden'));
  document.getElementById('nav-portfolio').classList.add('active');
  renderSidebar();

  document.getElementById('content').innerHTML = `
    ${renderPortfolioGantt()}
    <div class="section-header"><h2>All Projects</h2></div>
    <div style="overflow-x:auto">
      <table class="npi-table">
        <thead><tr>
          <th>Project</th>
          <th>Status</th>
          <th>Current Stage</th>
          <th>Build Qty (ETB / PS / FAS)</th>
          <th>Annual Revenue</th>
          <th>Annual Volume</th>
          <th>Start Date</th>
          <th>Duration</th>
          <th>Issues</th>
        </tr></thead>
        <tbody>${projects.map(renderProjectCard).join('')}</tbody>
      </table>
    </div>
  `;
  // Scroll portfolio gantt to near today
  const pgb = document.getElementById('pgb-outer');
  if (pgb) setTimeout(() => {
    const allD = [];
    projects.forEach(p => (p.stages||[]).forEach(stg => { if (stg.plannedDate) allD.push(new Date(stg.plannedDate)); }));
    if (!allD.length) return;
    const startM = getMonday(new Date(Math.min(...allD)));
    startM.setDate(startM.getDate() - 7);
    const todayWk = Math.floor((new Date() - startM) / (7 * 86400000));
    if (todayWk > 3) pgb.scrollLeft = Math.max(0, (todayWk - 3) * 64);
  }, 50);
}

function renderPortfolioGantt() {
  const CELL_W = 64;
  const allDates = [];
  projects.forEach(p => {
    (p.stages||[]).forEach(stg => {
      if (stg.plannedDate) allDates.push(new Date(stg.plannedDate));
      if (stg.actualDate) allDates.push(new Date(stg.actualDate));
    });
  });
  if (!allDates.length) return '<div style="color:var(--muted);padding:20px">No build stage data available.</div>';

  const minDate = new Date(Math.min(...allDates));
  const maxDate = new Date(Math.max(...allDates));
  const startM = getMonday(minDate);
  const endM = getMonday(maxDate);
  startM.setDate(startM.getDate() - 7);
  endM.setDate(endM.getDate() + 14);

  const weeks = [];
  let cur = new Date(startM);
  while (cur <= endM) { weeks.push(new Date(cur)); cur.setDate(cur.getDate() + 7); }

  const today = new Date();
  const todayWkIdx = weeks.findIndex(w => { const n = new Date(w); n.setDate(n.getDate()+7); return today >= w && today < n; });
  const todayOffInWk = todayWkIdx >= 0 ? (today - weeks[todayWkIdx]) / (7*86400000) : -1;
  const todayPx = todayWkIdx >= 0 ? todayWkIdx*CELL_W + todayOffInWk*CELL_W : -999;

  const stageColor = { completed:'#22c55e', 'in-progress':'#f59e0b', planned:'#3b82f6', ready:'#a78bfa', 'on-hold':'#94a3b8' };
  const stageBg    = { completed:'rgba(34,197,94,0.18)', 'in-progress':'rgba(245,158,11,0.18)', planned:'rgba(59,130,246,0.15)', ready:'rgba(167,139,250,0.18)', 'on-hold':'rgba(148,163,184,0.12)' };

  const wkHeader = weeks.map((w, i) => {
    const isCur = i === todayWkIdx;
    return `<div style="min-width:${CELL_W}px;width:${CELL_W}px;text-align:center;font-size:10px;color:${isCur?'var(--accent)':'var(--muted)'};padding:5px 0;border-right:1px solid var(--border);font-weight:${isCur?700:400}">Wk${getISOWeek(w)}<br><span style="font-size:9px">${fmtDateShort(w)}</span></div>`;
  }).join('');

  const rows = projects.map(p => {
    const currentStage = (p.stages||[]).find(s => s.status==='in-progress')
      || (p.stages||[]).find(s => s.status==='ready')
      || (p.stages||[]).find(s => s.status==='planned');
    const stLabel = { 'in-progress':'Active', ready:'Ready', planned:'Planned', completed:'Complete', 'on-hold':'On Hold' };
    const currentStageName = currentStage ? `${currentStage.name} · ${stLabel[currentStage.status]||currentStage.status}` : 'All complete';

    const bgCells = weeks.map((w, i) =>
      `<div style="position:absolute;left:${i*CELL_W}px;top:0;width:${CELL_W}px;height:100%;border-right:1px solid var(--border);${i===todayWkIdx?'background:rgba(79,126,248,0.06)':''}"></div>`
    ).join('');

    const bars = (p.stages||[]).map(stg => {
      const dateStr = stg.actualDate || stg.plannedDate;
      if (!dateStr) return '';
      const stDate = new Date(dateStr);
      const endDate = new Date(stDate);
      endDate.setDate(endDate.getDate() + 5);
      const barLeft = (stDate - weeks[0]) / (7*86400000) * CELL_W;
      const barWidth = Math.max(CELL_W * 0.7, (endDate - stDate) / (7*86400000) * CELL_W);
      const col = stageColor[stg.status] || '#3b82f6';
      const bg  = stageBg[stg.status]   || 'rgba(59,130,246,0.15)';
      const isCurrent = currentStage && stg.id === currentStage.id;
      return `<div style="position:absolute;left:${barLeft}px;top:7px;height:22px;width:${barWidth}px;background:${bg};border:${isCurrent?2:1}px solid ${col};border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:${col};overflow:hidden;white-space:nowrap;${isCurrent?'box-shadow:0 0 0 3px '+col+'33':''}" title="${stg.fullName} · ${stg.plannedDate||''}">${stg.name}${isCurrent?' ●':''}</div>`;
    }).join('');

    return `<div style="display:flex;border-bottom:1px solid var(--border);height:40px">
      <div style="position:sticky;left:0;width:180px;min-width:180px;background:var(--surface);z-index:2;border-right:1px solid var(--border);padding:5px 12px;display:flex;align-items:center;gap:8px">
        <span style="width:8px;height:8px;border-radius:50%;background:${p.color};flex-shrink:0"></span>
        <div style="overflow:hidden;min-width:0">
          <div style="font-weight:600;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;color:var(--text)" onclick="openProject('${p.id}')">${p.name}</div>
          <div style="font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${currentStageName}</div>
        </div>
      </div>
      <div style="position:relative;min-width:${weeks.length*CELL_W}px;height:40px;flex:1">
        ${bgCells}${bars}
      </div>
    </div>`;
  }).join('');

  const todayLine = todayWkIdx >= 0
    ? `<div style="position:absolute;left:${180+todayPx}px;top:0;bottom:0;width:2px;background:var(--accent);opacity:0.8;pointer-events:none;z-index:1"></div>`
    : '';

  return `
    <div class="section-header"><h2>Build Plan Overview</h2></div>
    <div id="pgb-outer" style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:auto;position:relative;margin-bottom:16px">
      <div style="display:flex;position:sticky;top:0;z-index:3;border-bottom:1px solid var(--border);background:var(--surface)">
        <div style="position:sticky;left:0;width:180px;min-width:180px;z-index:4;background:var(--surface);border-right:1px solid var(--border);padding:6px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted)">Project / Stage</div>
        <div style="display:flex;min-width:${weeks.length*CELL_W}px">${wkHeader}</div>
      </div>
      <div style="position:relative">${rows}${todayLine}</div>
    </div>
    <div style="display:flex;gap:16px;margin-bottom:20px;font-size:11px;flex-wrap:wrap;color:var(--muted)">
      <span><span style="color:#22c55e;font-weight:700">■</span> Completed</span>
      <span><span style="color:#f59e0b;font-weight:700">■</span> In Progress (●=current)</span>
      <span><span style="color:#3b82f6;font-weight:700">■</span> Planned</span>
      <span><span style="color:#a78bfa;font-weight:700">■</span> Ready</span>
      <span><span style="color:var(--accent)">│</span> Today &nbsp;· Click project name to open</span>
    </div>`;
}

function renderProjectCard(p) {
  const total = p.tasks.length;
  const done = p.tasks.filter(t => t.status==='done').length;
  const pct = total ? Math.round(done/total*100) : 0;
  const inp = p.tasks.filter(t => t.status==='inprogress').length;
  const openIssues = (p.issues||[]).filter(i => i.status!=='resolved');
  const critIssue = openIssues.find(i => i.severity==='critical');
  const overallSt = critIssue ? 'blocked' : inp > 0 ? 'inprogress' : pct===100 ? 'done' : 'open';
  const stLabel = {open:'Planning', inprogress:'Active', done:'Complete', blocked:'Blocked'};

  // Current stage
  const currentStage = (p.stages||[]).find(s => s.status==='in-progress')
    || (p.stages||[]).find(s => s.status==='ready')
    || (p.stages||[]).find(s => s.status==='planned');
  const stagePillClass = currentStage ? currentStage.status : 'planned';
  const stageStatusLabel = {completed:'Complete','in-progress':'Active',planned:'Planned',ready:'Ready','on-hold':'On Hold'};
  const stageCell = currentStage
    ? `<span class="stage-pill ${stagePillClass}">${currentStage.name}</span>
       <div style="font-size:10px;color:var(--muted);margin-top:3px">${stageStatusLabel[currentStage.status]||''} · ${currentStage.plannedDate ? fmtDate(currentStage.plannedDate) : '—'}</div>`
    : '<span style="color:var(--muted);font-size:11px">—</span>';

  // Build qty per stage
  const stageIds = ['etb','ps','fas'];
  const qtyBadges = stageIds.map(sid => {
    const stg = (p.stages||[]).find(s => s.id===sid);
    if (!stg) return '';
    const isActive = currentStage && currentStage.id === sid;
    return `<span class="qty-badge ${isActive?'active':''}" title="${stg.fullName}">${stg.name}: ${stg.buildQty||'—'}</span>`;
  }).join('');

  // Annual revenue / volume
  const fmtMoney = (v, cur) => {
    const sym = cur==='USD' ? '$' : cur==='EUR' ? '€' : '฿';
    return v >= 1000000 ? `${sym}${(v/1000000).toFixed(1)}M` : v >= 1000 ? `${sym}${(v/1000).toFixed(0)}K` : `${sym}${v}`;
  };
  const fmtVol = v => v >= 1000000 ? `${(v/1000000).toFixed(1)}M` : v >= 1000 ? `${(v/1000).toFixed(0)}K` : `${v}`;

  // Duration
  const dStart = new Date(p.startDate), dEnd = new Date(p.endDate);
  const totalDays = Math.round((dEnd - dStart) / 86400000);
  const durMonths = Math.round(totalDays / 30.4);
  const durLabel = durMonths >= 12 ? `${(durMonths/12).toFixed(1)} yr` : `${durMonths} mo`;

  // Issues button
  const issBtn = critIssue ? 'has-critical' : openIssues.length ? 'has-open' : '';
  const issBtnLabel = openIssues.length
    ? `${critIssue ? '🔴 ' : ''}${openIssues.length} open`
    : '<span style="color:#4ade80">✓ Clear</span>';

  return `<tr>
    <td>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="width:10px;height:10px;border-radius:50%;background:${p.color};flex-shrink:0"></span>
        <div>
          <div class="proj-name" onclick="openProject('${p.id}')">${p.name}</div>
          <div class="proj-sub">PGM: ${p.pgm} · ${p.customer}</div>
        </div>
      </div>
    </td>
    <td><span class="status-badge ${overallSt}">${stLabel[overallSt]}</span></td>
    <td>${stageCell}</td>
    <td style="white-space:nowrap">${qtyBadges || '<span style="color:var(--muted);font-size:11px">—</span>'}</td>
    <td style="font-size:13px;font-weight:700;color:var(--text)">${p.annualRevenue ? fmtMoney(p.annualRevenue, p.currency||'THB') : '<span style="color:var(--muted)">—</span>'}<div style="font-size:10px;color:var(--muted);font-weight:400">${p.currency||'THB'} / yr</div></td>
    <td style="font-size:13px;font-weight:700;color:var(--text)">${p.annualVolume ? fmtVol(p.annualVolume) : '<span style="color:var(--muted)">—</span>'}<div style="font-size:10px;color:var(--muted);font-weight:400">units / yr</div></td>
    <td style="font-size:12px;white-space:nowrap">${fmtDate(p.startDate)}</td>
    <td style="font-size:12px;white-space:nowrap;color:var(--text)">${durLabel}<div style="font-size:10px;color:var(--muted)">${fmtDate(p.startDate).split(' ')[1]+' '+fmtDate(p.startDate).split(' ')[2]} → ${fmtDate(p.endDate).split(' ')[1]+' '+fmtDate(p.endDate).split(' ')[2]}</div></td>
    <td><button class="btn-issues ${issBtn}" onclick="event.stopPropagation();showProjectIssuesModal('${p.id}')">${issBtnLabel}</button></td>
  </tr>`;
}

function showProjectIssuesModal(pid) {
  const p = projects.find(x => x.id===pid);
  if (!p) return;
  const issues = p.issues || [];
  const sevOrder = {critical:0,high:1,medium:2,low:3};
  const sorted = [...issues].sort((a,b) => (sevOrder[a.severity]||9)-(sevOrder[b.severity]||9));
  const stBg    = {open:'rgba(239,68,68,0.1)',investigating:'rgba(168,85,247,0.1)',resolved:'rgba(34,197,94,0.1)'};
  const stColor = {open:'#f87171',investigating:'#c084fc',resolved:'#4ade80'};
  const rows = sorted.length ? sorted.map(iss => `
    <div style="padding:12px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span class="sev-badge ${iss.severity}">${iss.severity}</span>
        <span style="flex:1;font-weight:600;font-size:13px;color:var(--heading)">${iss.title}</span>
        <span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;background:${stBg[iss.status]||''};color:${stColor[iss.status]||'var(--muted)'};white-space:nowrap">${iss.status}</span>
      </div>
      ${iss.desc ? `<div style="font-size:11px;color:var(--muted);margin-bottom:6px">${iss.desc}</div>` : ''}
      <div style="display:flex;gap:16px;font-size:11px;color:var(--muted);flex-wrap:wrap">
        <span>Owner: <strong style="color:var(--text)">${iss.owner||'—'}</strong></span>
        <span>Due: <strong style="color:var(--text)">${iss.due||'—'}</strong></span>
        ${iss.stage ? `<span>Stage: <strong style="color:var(--text)">${iss.stage.toUpperCase()}</strong></span>` : ''}
        ${iss.impact ? `<span style="color:#fbbf24">Impact: ${iss.impact}</span>` : ''}
      </div>
    </div>`).join('')
    : '<div style="color:var(--muted);text-align:center;padding:32px">No issues recorded.</div>';
  const openCount = issues.filter(i => i.status!=='resolved').length;
  const existing = document.getElementById('pf-issues-overlay');
  if (existing) existing.remove();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'pf-issues-overlay';
  overlay.innerHTML = `<div class="modal" style="width:640px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div>
        <h2 style="margin-bottom:2px">${p.name} — Issues</h2>
        <div style="font-size:12px;color:var(--muted)">${openCount} open · ${issues.length} total</div>
      </div>
      <button class="btn-action" onclick="document.getElementById('pf-issues-overlay').remove()">✕</button>
    </div>
    <div style="max-height:60vh;overflow-y:auto">${rows}</div>
    <div class="modal-actions" style="margin-top:12px">
      <button class="btn-action" onclick="document.getElementById('pf-issues-overlay').remove()">Close</button>
      <button class="btn-action primary" onclick="document.getElementById('pf-issues-overlay').remove();openProject('${pid}')">Open Project →</button>
    </div>
  </div>`;
  overlay.addEventListener('click', e => { if (e.target===overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

// ══════════════════════════════════════════════════
//  PROJECT DETAIL
// ══════════════════════════════════════════════════
function openProject(id) {
  currentProject = projects.find(p => p.id===id);
  stageFilter = '';
  closeSidebarIfMobile();
  document.getElementById('topbar-title').textContent = currentProject.name;
  document.getElementById('view-tabs').style.display = 'flex';
  ['btn-add-task','btn-add-member','btn-add-issue','btn-add-nre'].forEach(i => document.getElementById(i).classList.add('hidden'));
  document.getElementById('nav-portfolio').classList.remove('active');
  renderSidebar();
  currentView = 'gantt';
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===0));
  updateTopbarButtons();
  updateIssuesBadge();
  updateNREBadge();
  renderProjectDetail();
}

function switchView(view, btn) {
  currentView = view;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateTopbarButtons();
  renderProjectDetail();
}

function updateTopbarButtons() {
  document.getElementById('btn-add-task').classList.toggle('hidden', currentView !== 'gantt' && currentView !== 'list' && currentView !== 'milestones');
  document.getElementById('btn-add-member').classList.toggle('hidden', currentView !== 'team');
  document.getElementById('btn-add-issue').classList.toggle('hidden', currentView !== 'issues');
  document.getElementById('btn-add-nre').classList.toggle('hidden', currentView !== 'nre');
}

function updateIssuesBadge() {
  const p = currentProject;
  if (!p) return;
  const open = (p.issues||[]).filter(i => i.status!=='resolved').length;
  document.getElementById('issues-count-badge').textContent = open ? `(${open})` : '';
  document.getElementById('issues-count-badge').style.color = open ? '#f87171' : '';
}

function stageTag(stage) { if (!stage) return ''; const labels={etb:'ETB',ps:'PS',fas:'FAS'}; return `<span class="stage-tag ${stage}">${labels[stage]||stage}</span>`; }
function stageFilterHTML() {
  return `<div class="stage-filter-bar">
    <label>Stage:</label>
    <select onchange="setStageFilter(this.value)">
      <option value="" ${stageFilter===''?'selected':''}>All Stages</option>
      <option value="etb" ${stageFilter==='etb'?'selected':''}>ETB — External Test Build</option>
      <option value="ps" ${stageFilter==='ps'?'selected':''}>PS — Pre-Series Build</option>
      <option value="fas" ${stageFilter==='fas'?'selected':''}>FAS — First Article Sample</option>
    </select>
  </div>`;
}
function setStageFilter(val) { stageFilter = val; renderProjectDetail(); }

function renderProjectDetail() {
  if (currentView==='gantt') renderGantt();
  else if (currentView==='list') renderList();
  else if (currentView==='milestones') renderMilestones();
  else if (currentView==='team') renderTeam();
  else if (currentView==='stages') renderBuildStages();
  else if (currentView==='nre') renderNRE();
  else if (currentView==='issues') renderIssues();
}

// ── Gantt ──
function renderGantt() {
  const p = currentProject;
  const filteredTasks = stageFilter ? p.tasks.filter(t => (t.stage||'')===stageFilter) : p.tasks;
  const allDates = filteredTasks.flatMap(t => [new Date(t.start), new Date(t.end)]);
  if (!allDates.length) { document.getElementById('content').innerHTML = stageFilterHTML() + '<div style="text-align:center;padding:60px;color:var(--muted)">No tasks for this stage filter.</div>'; return; }
  const minDate = new Date(Math.min(...allDates));
  const maxDate = new Date(Math.max(...allDates));
  const startMonday = getMonday(minDate);
  const endMonday = getMonday(maxDate);
  startMonday.setDate(startMonday.getDate() - 7);
  endMonday.setDate(endMonday.getDate() + 14);

  const weeks = [];
  let cur = new Date(startMonday);
  while (cur <= endMonday) { weeks.push(new Date(cur)); cur.setDate(cur.getDate()+7); }

  const today = new Date();
  const todayWkIdx = weeks.findIndex(w => { const n=new Date(w); n.setDate(n.getDate()+7); return today>=w && today<n; });
  const todayOffInWk = todayWkIdx>=0 ? (today-weeks[todayWkIdx])/(7*86400000) : -1;

  // Build issue lookup: taskId -> [issues]
  const taskIssueMap = {};
  (p.issues||[]).forEach(iss => {
    (iss.linkedTasks||[]).forEach(tid => {
      if (!taskIssueMap[tid]) taskIssueMap[tid] = [];
      taskIssueMap[tid].push(iss);
    });
  });

  const sections = [...new Set(filteredTasks.map(t => t.section))];
  const rows = [];
  sections.forEach(sec => {
    rows.push({isSection:true, label:sec});
    filteredTasks.filter(t => t.section===sec).forEach(t => rows.push({isSection:false, task:t}));
  });

  const wkHeader = weeks.map((w,i) => {
    const isCur = i===todayWkIdx;
    return `<div class="wk-header-cell ${isCur?'current':''}">Wk${getISOWeek(w)}<span class="wk-date">${fmtDateShort(w)}</span></div>`;
  }).join('');

  const leftRows = rows.map(row => {
    if (row.isSection) return `<div class="task-row section-row">
      <div class="tc-cell tc-item"></div>
      <div class="tc-cell tc-task" style="flex:1;color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;padding-left:14px">${row.label}</div>
    </div>`;
    const t = row.task;
    const taskIssues = taskIssueMap[t.id] || [];
    const openIss = taskIssues.filter(i => i.status!=='resolved');
    const stLabel = {open:'Open',inprogress:'In Progress',done:'Done',blocked:'Blocked'};
    const issChip = taskIssues.length ? `<span class="issue-chip ${openIss.length?'has-open':'has-only-resolved'}" onclick="event.stopPropagation();switchViewTo('issues')" title="${openIss.length} open issue(s) linked">${openIss.length||'✓'}</span>` : '';
    return `<div class="task-row status-${t.status}" ondblclick="editTask(${t.id})">
      <div class="tc-cell tc-item">${t.id}</div>
      <div class="tc-cell tc-task">
        <div>${t.name}${stageTag(t.stage)}</div>
        ${t.remark ? `<div class="tc-remark">${t.remark.split('\n')[0].substring(0,50)}</div>` : ''}
      </div>
      <div class="tc-cell tc-who"><span class="who-pill" title="${t.who}">${t.who}</span></div>
      <div class="tc-cell tc-dur">${t.days}d</div>
      <div class="tc-cell tc-status"><span class="status-dot">${stLabel[t.status]}</span></div>
      <div class="tc-cell tc-issues">${issChip}</div>
    </div>`;
  }).join('');

  const timelineRows = rows.map(row => {
    if (row.isSection) return `<div class="timeline-row section-row" style="min-width:${weeks.length*80}px">${weeks.map(()=>'<div class="wk-cell"></div>').join('')}</div>`;
    const t = row.task;
    const taskIssues = taskIssueMap[t.id] || [];
    const openIss = taskIssues.filter(i => i.status!=='resolved');
    const barLeft = (new Date(t.start)-weeks[0])/(7*86400000)*80;
    const barWidth = Math.max(16,(new Date(t.end)-new Date(t.start))/(7*86400000)*80);
    const cells = weeks.map((w,i) => `<div class="wk-cell ${i===todayWkIdx?'current-wk':''}"></div>`).join('');
    return `<div class="timeline-row" style="min-width:${weeks.length*80}px;position:relative">
      ${cells}
      <div class="gantt-bar ${t.status}" style="left:${barLeft}px;width:${barWidth}px" title="${t.name}: ${t.start} → ${t.end}">
        ${barWidth>40 ? t.name.substring(0,Math.floor(barWidth/7)) : ''}
        ${openIss.length ? '<span class="issue-flag" title="Has open issues"></span>' : ''}
      </div>
    </div>`;
  }).join('');

  const todayPx = todayWkIdx>=0 ? todayWkIdx*80 + todayOffInWk*80 : -999;

  document.getElementById('content').innerHTML = stageFilterHTML() + `
    <div class="gantt-wrap">
      <div class="gantt-container">
        <div class="gantt-left">
          <div class="gantt-header-row">
            <div class="gh-cell gh-item">#</div>
            <div class="gh-cell gh-task">Task</div>
            <div class="gh-cell gh-who">Assigned</div>
            <div class="gh-cell gh-dur">Days</div>
            <div class="gh-cell gh-status">Status</div>
            <div class="gh-cell gh-issues">⚠</div>
          </div>
          <div class="gantt-tasks" id="gl-scroll">${leftRows}</div>
        </div>
        <div class="gantt-right">
          <div id="gh-header-scroll" style="overflow-x:hidden;flex-shrink:0;">
            <div class="timeline-header" style="min-width:${weeks.length*80}px">${wkHeader}</div>
          </div>
          <div id="gr-scroll" style="overflow:auto;flex:1;position:relative">
            <div style="position:relative;min-width:${weeks.length*80}px">
              ${timelineRows}
              ${todayWkIdx>=0 ? `<div class="today-line" style="left:${todayPx}px;height:100%;position:absolute;top:0"></div>` : ''}
            </div>
          </div>
        </div>
      </div>
    </div>
    <div style="margin-top:8px;font-size:11px;color:var(--muted)">
      Double-click a row to edit &nbsp;·&nbsp; <span style="color:var(--accent)">Blue line</span> = today &nbsp;·&nbsp;
      <span style="color:#f87171">Red dot</span> on bar = open issue linked
    </div>`;

  const gl = document.getElementById('gl-scroll');
  const gr = document.getElementById('gr-scroll');
  const ghh = document.getElementById('gh-header-scroll');
  gl.addEventListener('scroll', () => gr.scrollTop = gl.scrollTop);
  gr.addEventListener('scroll', () => { gl.scrollTop = gr.scrollTop; ghh.scrollLeft = gr.scrollLeft; });
  if (todayWkIdx>0) setTimeout(() => gr.scrollLeft = Math.max(0,(todayWkIdx-3)*80), 50);
}

// ── List ──
function renderList() {
  const p = currentProject;
  const filteredTasks = stageFilter ? p.tasks.filter(t => (t.stage||'')===stageFilter) : p.tasks;
  if (!filteredTasks.length) { document.getElementById('content').innerHTML = stageFilterHTML() + '<div style="text-align:center;padding:60px;color:var(--muted)">No tasks for this stage filter.</div>'; return; }
  const sections = [...new Set(filteredTasks.map(t => t.section))];
  const taskIssueMap = {};
  (p.issues||[]).forEach(iss => (iss.linkedTasks||[]).forEach(tid => { if(!taskIssueMap[tid]) taskIssueMap[tid]=[]; taskIssueMap[tid].push(iss); }));

  const rows = sections.map(sec => {
    const tasks = filteredTasks.filter(t => t.section===sec);
    return `<tr><td colspan="8" style="background:var(--surface2);padding:8px 16px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px">${sec}</td></tr>
    ${tasks.map(t => {
      const tIss = (taskIssueMap[t.id]||[]);
      const openIss = tIss.filter(i=>i.status!=='resolved');
      const issCell = tIss.length ? `<span class="issue-chip ${openIss.length?'has-open':'has-only-resolved'}" title="${openIss.length} open issues">${openIss.length||'✓'}</span>` : '';
      return `<tr style="border-bottom:1px solid var(--border)" ondblclick="editTask(${t.id})" onmouseenter="this.style.background='rgba(79,126,248,0.04)'" onmouseleave="this.style.background=''">
        <td style="padding:8px 14px;color:var(--muted);font-size:11px">${t.id}</td>
        <td style="padding:8px 12px;font-weight:500">${t.name}${stageTag(t.stage)}</td>
        <td style="padding:8px 12px;color:var(--muted);font-size:11px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.remark||'—'}</td>
        <td style="padding:8px 12px"><span class="who-pill">${t.who}</span></td>
        <td style="padding:8px 12px;color:var(--muted);font-size:11px">${fmtDate(t.start)}</td>
        <td style="padding:8px 12px;color:var(--muted);font-size:11px">${fmtDate(t.end)}</td>
        <td style="padding:8px 12px"><span class="status-badge ${t.status}">${{open:'Open',inprogress:'In Progress',done:'Done',blocked:'Blocked'}[t.status]}</span></td>
        <td style="padding:8px 12px;text-align:center">${issCell}</td>
      </tr>`;
    }).join('')}`;
  }).join('');

  document.getElementById('content').innerHTML = stageFilterHTML() + `
    <div class="gantt-wrap" style="overflow:auto">
      <table style="width:100%;border-collapse:collapse">
        <thead><tr style="background:var(--surface2);border-bottom:1px solid var(--border)">
          <th class="gh-cell" style="width:36px;text-align:left">#</th>
          <th class="gh-cell" style="text-align:left">Task</th>
          <th class="gh-cell" style="text-align:left">Remark</th>
          <th class="gh-cell" style="text-align:left">Assigned</th>
          <th class="gh-cell" style="text-align:left">Start</th>
          <th class="gh-cell" style="text-align:left">End</th>
          <th class="gh-cell" style="text-align:left">Status</th>
          <th class="gh-cell" style="text-align:center;width:40px">⚠</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div style="margin-top:8px;font-size:11px;color:var(--muted)">Double-click a row to edit</div>`;
}

// ── Milestones ──
function renderMilestones() {
  const p = currentProject;
  const filteredTasks = stageFilter ? p.tasks.filter(t => (t.stage||'')===stageFilter) : p.tasks;
  if (!filteredTasks.length) { document.getElementById('content').innerHTML = stageFilterHTML() + '<div style="text-align:center;padding:60px;color:var(--muted)">No tasks for this stage filter.</div>'; return; }
  const sections = [...new Set(filteredTasks.map(t => t.section))];
  document.getElementById('content').innerHTML = stageFilterHTML() + sections.map(sec => {
    const tasks = filteredTasks.filter(t => t.section===sec);
    const done = tasks.filter(t => t.status==='done').length;
    const pct = Math.round(done/tasks.length*100);
    const first = tasks.map(t=>t.start).sort()[0];
    const last = tasks.map(t=>t.end).sort().reverse()[0];
    const hasBlocked = tasks.some(t=>t.status==='blocked');
    const hasInp = tasks.some(t=>t.status==='inprogress');
    const st = hasBlocked?'blocked':pct===100?'done':hasInp?'inprogress':'open';
    const stL = {open:'Open',inprogress:'Active',done:'Complete',blocked:'Blocked'};
    const colors = {open:'#60a5fa',inprogress:'#fbbf24',done:'#4ade80',blocked:'#f87171'};
    return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div style="font-size:14px;font-weight:700;color:var(--heading)">${sec}</div>
        <span class="status-badge ${st}">${stL[st]}</span>
      </div>
      <div style="display:flex;gap:20px;margin-bottom:8px;font-size:12px;color:var(--muted)">
        <span>Start: <strong style="color:var(--text)">${fmtDate(first)}</strong></span>
        <span>End: <strong style="color:var(--text)">${fmtDate(last)}</strong></span>
        <span>Tasks: <strong style="color:var(--text)">${done}/${tasks.length}</strong></span>
      </div>
      <div class="progress-bar" style="margin-bottom:12px"><div class="progress-bar-fill" style="width:${pct}%;background:${p.color}"></div></div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${tasks.map(t => `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:11px;display:flex;gap:6px;align-items:center">
          <span style="width:6px;height:6px;border-radius:50%;background:${colors[t.status]};display:inline-block;flex-shrink:0"></span>
          ${t.name}${stageTag(t.stage)} <span style="color:var(--muted)">${t.who}</span>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

// ── TEAM ──
function renderTeam() {
  const p = currentProject;
  const team = p.team || [];
  const avatarColors = ['#4f7ef8','#7c5cfc','#22c55e','#f59e0b','#ef4444','#06b6d4','#a855f7'];

  // Count tasks per member
  const memberTaskCount = {};
  p.tasks.forEach(t => {
    const who = t.who.toLowerCase();
    team.forEach(m => {
      if (who.includes(m.name.split(' ')[0].toLowerCase()) || who.includes(m.company.toLowerCase())) {
        memberTaskCount[m.id] = (memberTaskCount[m.id] || 0) + 1;
      }
    });
  });

  if (!team.length) {
    document.getElementById('content').innerHTML = `
      <div style="text-align:center;padding:60px 20px;color:var(--muted)">
        <div style="font-size:36px;margin-bottom:12px">👥</div>
        <div style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px">No team members yet</div>
        <div style="font-size:13px;margin-bottom:20px">Add team members to track who is responsible for this project.</div>
        <button class="btn-action primary" onclick="openMemberModal()">+ Add First Member</button>
      </div>`;
    return;
  }

  document.getElementById('content').innerHTML = `
    <div class="section-header" style="margin-bottom:16px">
      <h2>Team — ${p.name}</h2>
      <span style="color:var(--muted);font-size:13px">${team.length} member${team.length!==1?'s':''}</span>
    </div>
    <div class="team-grid">
      ${team.map((m,idx) => {
        const initials = m.name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
        const bg = avatarColors[idx % avatarColors.length];
        const taskCt = memberTaskCount[m.id] || 0;
        return `<div class="member-card">
          <div style="display:flex;align-items:center;gap:12px">
            <div class="member-avatar" style="background:${bg}">${initials}</div>
            <div>
              <div class="member-name">${m.name}</div>
              <div class="member-role">${m.role}</div>
            </div>
          </div>
          <div style="font-size:11px;color:var(--muted);display:flex;flex-direction:column;gap:4px;margin-top:4px">
            <div>🏢 ${m.company}</div>
            ${m.email ? `<div>✉ <a href="mailto:${m.email}" style="color:var(--accent);text-decoration:none">${m.email}</a></div>` : ''}
            ${m.phone ? `<div>📞 ${m.phone}</div>` : ''}
          </div>
          <div class="member-tasks">Tasks assigned: <strong>${taskCt}</strong></div>
          <div style="display:flex;gap:6px;margin-top:6px">
            <button class="btn-action" style="flex:1;padding:5px 8px;font-size:11px" onclick="openMemberModal(${m.id})">Edit</button>
            <button class="btn-action danger" style="padding:5px 8px;font-size:11px" onclick="deleteMember(${m.id})">Remove</button>
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

// ── ISSUES ──
function renderIssues() {
  const p = currentProject;
  const issues = p.issues || [];
  const sevOrder = {critical:0,high:1,medium:2,low:3};
  const sorted = [...issues].sort((a,b) => {
    if (a.status!=='resolved' && b.status==='resolved') return -1;
    if (a.status==='resolved' && b.status!=='resolved') return 1;
    return sevOrder[a.severity] - sevOrder[b.severity];
  });

  if (!sorted.length) {
    document.getElementById('content').innerHTML = `
      <div style="text-align:center;padding:60px 20px;color:var(--muted)">
        <div style="font-size:36px;margin-bottom:12px">✅</div>
        <div style="font-size:16px;font-weight:700;color:#4ade80;margin-bottom:6px">No issues logged</div>
        <div style="font-size:13px;margin-bottom:20px">This project has a clean issue log. Log an issue if something comes up.</div>
        <button class="btn-action primary" onclick="openIssueModal()">+ Log First Issue</button>
      </div>`;
    return;
  }

  const open = sorted.filter(i=>i.status!=='resolved');
  const resolved = sorted.filter(i=>i.status==='resolved');

  const renderIssue = (iss) => {
    const stLabel = {open:'Open',investigating:'Investigating',resolved:'Resolved'};
    const taskNames = (iss.linkedTasks||[]).map(tid => {
      const t = p.tasks.find(t=>t.id===tid);
      return t ? `<span class="linked-task-tag" title="Go to task" onclick="switchViewTo('gantt')">#${t.id} ${t.name}</span>` : '';
    }).join('');
    return `<div class="issue-card ${iss.severity}" style="${iss.status==='resolved'?'opacity:0.55':''}">
      <div class="issue-header">
        <div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <span class="sev-badge ${iss.severity}">${iss.severity}</span>
            <span class="status-badge ${iss.status==='resolved'?'done':iss.status==='investigating'?'inprogress':'open'}">${stLabel[iss.status]}</span>
          </div>
          <div class="issue-title">${iss.title}</div>
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0">
          <button class="btn-action" style="padding:4px 10px;font-size:11px" onclick="openIssueModal(${iss.id})">Edit</button>
          <button class="btn-action danger" style="padding:4px 10px;font-size:11px" onclick="deleteIssue(${iss.id})">Delete</button>
        </div>
      </div>
      <div class="issue-desc">${iss.desc}</div>
      <div class="issue-meta">
        ${iss.impact ? `<span class="impact-tag">Impact: ${iss.impact}</span>` : ''}
        <span style="font-size:11px;color:var(--muted)">Owner: <strong style="color:var(--text)">${iss.owner||'—'}</strong></span>
        ${iss.due ? `<span style="font-size:11px;color:var(--muted)">Due: <strong style="color:var(--text)">${fmtDate(iss.due)}</strong></span>` : ''}
      </div>
      ${taskNames ? `<div class="issue-linked-tasks"><span style="font-size:10px;color:var(--muted);margin-right:4px">Linked tasks:</span>${taskNames}</div>` : ''}
    </div>`;
  };

  document.getElementById('content').innerHTML = `
    <div class="section-header" style="margin-bottom:4px">
      <h2>Issues — ${p.name}</h2>
      <span style="color:var(--muted);font-size:13px">${open.length} open · ${resolved.length} resolved</span>
    </div>
    ${open.length ? `<div style="margin-bottom:20px">${open.map(renderIssue).join('')}</div>` : ''}
    ${resolved.length ? `
      <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px">Resolved</div>
      ${resolved.map(renderIssue).join('')}` : ''}`;
}

// ══════════════════════════════════════════════════
//  BUILD STAGES VIEW
// ══════════════════════════════════════════════════
function renderBuildStages() {
  const p = currentProject;
  const stages = p.stages || [];
  if (!stages.length) { document.getElementById('content').innerHTML = '<div style="text-align:center;padding:60px;color:var(--muted)">No stages configured.</div>'; return; }

  const stLabels = {planned:'Planned',ready:'Ready','in-progress':'In Progress',completed:'Completed','on-hold':'On Hold'};
  const apLabels = {pending:'Pending',approved:'Approved',conditional:'Conditional',rejected:'Rejected'};

  const cards = stages.map((stg, idx) => {
    const tasks = p.tasks.filter(t => t.stage === stg.id);
    const tasksDone = tasks.filter(t => t.status==='done').length;
    const taskPct = tasks.length ? Math.round(tasksDone/tasks.length*100) : 0;
    const nreItems = (p.nreItems||[]).filter(n => n.stage === stg.id);
    const nreWithPO = nreItems.filter(n => n.poStatus!=='no-po').length;
    const nrePct = nreItems.length ? Math.round(nreWithPO/nreItems.length*100) : 100;
    const issues = (p.issues||[]).filter(i => i.stage === stg.id && i.status!=='resolved');
    const manualChecked = stg.gateChecklist.filter(g => g.checked).length;
    const manualTotal = stg.gateChecklist.length;
    const manualPct = manualTotal ? Math.round(manualChecked/manualTotal*100) : 100;

    const autoGates = [
      { label: `Tasks done: ${tasksDone}/${tasks.length}`, pct: taskPct, ok: taskPct===100 },
      { label: `NRE with PO: ${nreWithPO}/${nreItems.length}`, pct: nrePct, ok: nrePct===100 },
      { label: `Open issues: ${issues.length}`, pct: issues.length?0:100, ok: issues.length===0 },
    ];
    const overallGatePct = manualTotal > 0
      ? Math.round((autoGates.reduce((s,g)=>s+g.pct,0)/autoGates.length + manualPct) / 2)
      : Math.round(autoGates.reduce((s,g)=>s+g.pct,0)/autoGates.length);

    const gateColor = overallGatePct===100 ? '#4ade80' : overallGatePct>=50 ? '#fbbf24' : '#f87171';

    const postBuildHtml = (stg.status==='completed' || stg.qtyProduced > 0) ? `
      <div class="post-build">
        <div class="gate-title">Post-Build Results</div>
        <div class="post-build-grid">
          <div class="post-build-stat"><div class="val" style="color:var(--text)">${stg.qtyProduced}</div><div class="lbl">Produced</div></div>
          <div class="post-build-stat"><div class="val" style="color:#4ade80">${stg.qtyPassed}</div><div class="lbl">Passed</div></div>
          <div class="post-build-stat"><div class="val" style="color:${stg.yieldPct>=90?'#4ade80':stg.yieldPct>=70?'#fbbf24':'#f87171'}">${stg.yieldPct}%</div><div class="lbl">Yield</div></div>
        </div>
        <div style="margin-top:8px;text-align:center">
          <span class="approval-badge ${stg.customerApproval}">${apLabels[stg.customerApproval]}</span>
          ${stg.approvalNotes ? `<div style="font-size:10px;color:var(--muted);margin-top:4px">${stg.approvalNotes}</div>` : ''}
        </div>
      </div>` : '';

    const arrow = idx < stages.length - 1 ? '<div class="stage-arrow">→</div>' : '';

    return `<div class="stage-card ${stg.status}">
      <div class="stage-header">
        <div>
          <div class="stage-name">${stg.name}</div>
          <div class="stage-fullname">${stg.fullName}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
          <span class="stage-status-badge ${stg.status}">${stLabels[stg.status]}</span>
          <button class="btn-action" style="padding:3px 8px;font-size:10px" onclick="openStageModal('${stg.id}')">Edit</button>
        </div>
      </div>
      <div class="stage-meta">
        <div>Planned: <strong>${stg.plannedDate ? fmtDate(stg.plannedDate) : '—'}</strong></div>
        <div>Actual: <strong>${stg.actualDate ? fmtDate(stg.actualDate) : '—'}</strong></div>
        <div>Build Qty: <strong>${stg.buildQty || '—'}</strong></div>
        <div>Location: <strong>${stg.buildLocation || '—'}</strong></div>
        <div>BOM Rev: <strong>${stg.bomRevision || '—'}</strong></div>
        <div>Tasks: <strong>${tasksDone}/${tasks.length}</strong></div>
      </div>
      <div class="gate-section">
        <div class="gate-title">Gate Readiness — ${overallGatePct}%</div>
        <div class="gate-bar"><div class="gate-bar-fill" style="width:${overallGatePct}%;background:${gateColor}"></div></div>
        <div style="margin-top:8px">
          ${autoGates.map(g => `<div style="display:flex;align-items:center;gap:6px;font-size:11px;margin-bottom:3px">
            <span style="width:14px;height:14px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;${g.ok?'background:var(--green);color:#fff':'background:var(--surface2);color:var(--muted);border:1px solid var(--border)'}">${g.ok?'✓':''}</span>
            <span style="color:${g.ok?'var(--text)':'var(--muted)'}">${g.label}</span>
          </div>`).join('')}
          ${stg.gateChecklist.length ? '<div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--border)"></div>' : ''}
          ${stg.gateChecklist.map(g => `<div class="gate-item" onclick="toggleGateItem('${stg.id}',${g.id})">
            <span class="gate-check ${g.checked?'checked':''}">${g.checked?'✓':''}</span>
            <span style="color:${g.checked?'var(--text)':'var(--muted)'}">${g.label}</span>
          </div>`).join('')}
        </div>
      </div>
      ${stg.notes ? `<div style="margin-top:10px;font-size:11px;color:var(--muted);padding:8px;background:var(--surface2);border-radius:6px">${stg.notes}</div>` : ''}
      ${postBuildHtml}
    </div>${arrow}`;
  }).join('');

  const currentStage = stages.find(s => s.status==='in-progress') || stages.find(s => s.status==='ready') || stages.find(s => s.status==='planned');

  document.getElementById('content').innerHTML = `
    <div class="section-header" style="margin-bottom:4px">
      <h2>Build Stages — ${p.name}</h2>
      <span style="color:var(--muted);font-size:13px">Current: <strong style="color:var(--text)">${currentStage ? currentStage.name+' ('+stLabels[currentStage.status]+')' : 'All completed'}</strong></span>
    </div>
    <div class="stage-pipeline">${cards}</div>
    <div style="margin-top:8px;font-size:11px;color:var(--muted)">Click Edit to modify stage details · Click checklist items to toggle</div>`;
}

function toggleGateItem(stageId, gateId) {
  const stg = currentProject.stages.find(s => s.id===stageId);
  if (!stg) return;
  const item = stg.gateChecklist.find(g => g.id===gateId);
  if (item) { item.checked = !item.checked; renderBuildStages(); }
}

// ══════════════════════════════════════════════════
//  STAGE MODAL
// ══════════════════════════════════════════════════
let tempGateChecklist = [];

function openStageModal(stageId) {
  editingStageId = stageId;
  const stg = currentProject.stages.find(s => s.id===stageId);
  if (!stg) return;
  document.getElementById('modal-stage-title').textContent = `Edit ${stg.name} — ${stg.fullName}`;
  document.getElementById('stg-name').value = `${stg.name} — ${stg.fullName}`;
  document.getElementById('stg-status').value = stg.status;
  document.getElementById('stg-planned').value = stg.plannedDate||'';
  document.getElementById('stg-actual').value = stg.actualDate||'';
  document.getElementById('stg-qty').value = stg.buildQty||'';
  document.getElementById('stg-location').value = stg.buildLocation||'';
  document.getElementById('stg-bom').value = stg.bomRevision||'';
  document.getElementById('stg-approval').value = stg.customerApproval||'pending';
  document.getElementById('stg-produced').value = stg.qtyProduced||0;
  document.getElementById('stg-passed').value = stg.qtyPassed||0;
  document.getElementById('stg-approval-notes').value = stg.approvalNotes||'';
  document.getElementById('stg-notes').value = stg.notes||'';
  tempGateChecklist = JSON.parse(JSON.stringify(stg.gateChecklist||[]));
  renderGateChecklistEditor();
  document.getElementById('stage-modal').classList.remove('hidden');
}

function renderGateChecklistEditor() {
  document.getElementById('stg-gate-list').innerHTML = tempGateChecklist.map((g,i) =>
    `<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
      <input type="checkbox" ${g.checked?'checked':''} onchange="tempGateChecklist[${i}].checked=this.checked" style="accent-color:var(--green)">
      <span style="flex:1;font-size:12px;color:var(--text)">${g.label}</span>
      <button class="btn-action danger" style="padding:2px 6px;font-size:9px" onclick="tempGateChecklist.splice(${i},1);renderGateChecklistEditor()">✕</button>
    </div>`
  ).join('') || '<div style="font-size:11px;color:var(--muted)">No checklist items yet</div>';
}

function addGateItem() {
  const input = document.getElementById('stg-new-gate');
  const label = input.value.trim();
  if (!label) return;
  const maxId = tempGateChecklist.length ? Math.max(...tempGateChecklist.map(g=>g.id)) : 0;
  tempGateChecklist.push({id: maxId+1, label, checked: false});
  input.value = '';
  renderGateChecklistEditor();
}

function closeStageModal() { document.getElementById('stage-modal').classList.add('hidden'); editingStageId=null; }

function saveStage() {
  const stg = currentProject.stages.find(s => s.id===editingStageId);
  if (!stg) return;
  stg.status = document.getElementById('stg-status').value;
  stg.plannedDate = document.getElementById('stg-planned').value;
  stg.actualDate = document.getElementById('stg-actual').value;
  stg.buildQty = parseInt(document.getElementById('stg-qty').value)||0;
  stg.buildLocation = document.getElementById('stg-location').value.trim();
  stg.bomRevision = document.getElementById('stg-bom').value.trim();
  stg.customerApproval = document.getElementById('stg-approval').value;
  stg.qtyProduced = parseInt(document.getElementById('stg-produced').value)||0;
  stg.qtyPassed = parseInt(document.getElementById('stg-passed').value)||0;
  stg.yieldPct = stg.qtyProduced > 0 ? Math.round(stg.qtyPassed/stg.qtyProduced*100) : 0;
  stg.approvalNotes = document.getElementById('stg-approval-notes').value.trim();
  stg.notes = document.getElementById('stg-notes').value.trim();
  stg.gateChecklist = tempGateChecklist;
  closeStageModal();
  renderProjectDetail();
}

// ══════════════════════════════════════════════════
//  NRE COSTS VIEW
// ══════════════════════════════════════════════════
function fmtCurrency(amount, currency) {
  const sym = {THB:'฿', USD:'$', EUR:'€'}[currency] || currency;
  return sym + amount.toLocaleString(undefined, {minimumFractionDigits:0, maximumFractionDigits:2});
}

function updateNREBadge() {
  const p = currentProject;
  if (!p) return;
  const noPO = (p.nreItems||[]).filter(n => n.poStatus==='no-po').length;
  const badge = document.getElementById('nre-count-badge');
  badge.textContent = noPO ? `(${noPO})` : '';
  badge.style.color = noPO ? '#f87171' : '';
}

function renderNRE() {
  const p = currentProject;
  const items = p.nreItems || [];
  updateNREBadge();

  if (!items.length) {
    document.getElementById('content').innerHTML = `
      <div style="text-align:center;padding:60px 20px;color:var(--muted)">
        <div style="font-size:36px;margin-bottom:12px">💳</div>
        <div style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px">No NRE items tracked yet</div>
        <div style="font-size:13px;margin-bottom:20px">Track non-recurring engineering costs like stencils, jig fixtures, test fixtures, and tooling.</div>
        <button class="btn-action primary" onclick="openNREModal()">+ Add First NRE Item</button>
      </div>`;
    return;
  }

  const totalCost = items.reduce((s,n) => s + (n.cost * n.qty), 0);
  const noPO = items.filter(n => n.poStatus==='no-po');
  const withPO = items.filter(n => n.poStatus!=='no-po');
  const paidItems = items.filter(n => n.poStatus==='paid');
  const poCost = withPO.reduce((s,n) => s + (n.cost * n.qty), 0);
  const paidCost = paidItems.reduce((s,n) => s + (n.cost * n.qty), 0);

  const poLabels = {'no-po':'No PO','po-requested':'PO Requested','po-received':'PO Received','invoiced':'Invoiced','paid':'Paid'};

  const categories = [...new Set(items.map(n => n.category))];
  const tableRows = categories.map(cat => {
    const catItems = items.filter(n => n.category===cat);
    return `<tr class="nre-category-row"><td colspan="9">${cat} (${catItems.length})</td></tr>
    ${catItems.map(n => {
      const taskNames = (n.linkedTasks||[]).map(tid => {
        const t = p.tasks.find(t=>t.id===tid);
        return t ? `<span class="linked-task-tag" onclick="switchViewTo('gantt')">#${t.id} ${t.name}</span>` : '';
      }).join('');
      const overdue = n.poStatus==='no-po' && n.due && new Date(n.due) < new Date();
      return `<tr ondblclick="openNREModal(${n.id})">
        <td style="color:var(--muted);font-size:11px">${n.id}</td>
        <td><div style="font-weight:500">${n.desc}</div>${taskNames ? `<div style="margin-top:4px;display:flex;flex-wrap:wrap;gap:4px">${taskNames}</div>` : ''}</td>
        <td><span class="who-pill">${n.supplier}</span></td>
        <td style="text-align:center">${n.qty}</td>
        <td class="nre-cost" style="text-align:right">${fmtCurrency(n.cost * n.qty, n.currency)}</td>
        <td><span class="po-badge ${n.poStatus}">${poLabels[n.poStatus]}</span></td>
        <td style="font-size:11px;color:var(--muted)">${n.poNumber || '—'}</td>
        <td style="font-size:11px;color:${overdue?'#f87171':'var(--muted)'}">${n.due ? fmtDate(n.due) : '—'}${overdue?' ⚠':''}</td>
        <td style="text-align:center">
          <button class="btn-action" style="padding:3px 8px;font-size:10px" onclick="openNREModal(${n.id})">Edit</button>
          <button class="btn-action danger" style="padding:3px 8px;font-size:10px;margin-left:4px" onclick="deleteNREItem(${n.id})">Del</button>
        </td>
      </tr>`;
    }).join('')}`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="section-header" style="margin-bottom:4px">
      <h2>NRE Costs — ${p.name}</h2>
      <span style="color:var(--muted);font-size:13px">${items.length} item${items.length!==1?'s':''} · Customer: <strong style="color:var(--text)">${p.customer}</strong></span>
    </div>
    <div class="stats-row" style="margin-top:12px">
      <div class="stat-card"><div class="stat-val blue">${fmtCurrency(totalCost,'THB')}</div><div class="stat-label">Total Estimated NRE</div></div>
      <div class="stat-card"><div class="stat-val green">${fmtCurrency(poCost,'THB')}</div><div class="stat-label">Covered by PO</div></div>
      <div class="stat-card"><div class="stat-val red">${noPO.length}</div><div class="stat-label">Missing PO</div></div>
      <div class="stat-card"><div class="stat-val" style="color:#c084fc">${fmtCurrency(paidCost,'THB')}</div><div class="stat-label">Paid</div></div>
    </div>
    <div class="gantt-wrap" style="overflow:auto;margin-top:16px">
      <table class="nre-table">
        <thead><tr>
          <th style="width:36px">#</th>
          <th>Description / Linked Tasks</th>
          <th>Supplier</th>
          <th style="text-align:center">Qty</th>
          <th style="text-align:right">Cost</th>
          <th>PO Status</th>
          <th>PO Number</th>
          <th>Needed By</th>
          <th style="text-align:center;width:100px">Actions</th>
        </tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>
    <div style="margin-top:8px;font-size:11px;color:var(--muted)">Double-click a row to edit · <span style="color:#f87171">⚠</span> = overdue & no PO</div>`;
}

// ══════════════════════════════════════════════════
//  NRE MODAL
// ══════════════════════════════════════════════════
function openNREModal(nreId=null) {
  editingNreId = nreId;
  document.getElementById('modal-nre-title').textContent = nreId ? 'Edit NRE Item' : 'Add NRE Item';

  const existing = nreId ? (currentProject.nreItems.find(n=>n.id==nreId)||{}).linkedTasks||[] : [];
  document.getElementById('nre-task-pills').innerHTML = currentProject.tasks.map(t =>
    `<div class="checkbox-pill ${existing.includes(t.id)?'selected':''}" data-tid="${t.id}" onclick="this.classList.toggle('selected')">
      #${t.id} ${t.name.substring(0,28)}
    </div>`
  ).join('');

  if (nreId) {
    const n = currentProject.nreItems.find(x=>x.id==nreId);
    document.getElementById('nre-category').value = n.category;
    document.getElementById('nre-desc').value = n.desc;
    document.getElementById('nre-supplier').value = n.supplier;
    document.getElementById('nre-cost').value = n.cost;
    document.getElementById('nre-currency').value = n.currency;
    document.getElementById('nre-po-status').value = n.poStatus;
    document.getElementById('nre-po-number').value = n.poNumber||'';
    document.getElementById('nre-due').value = n.due||'';
    document.getElementById('nre-qty').value = n.qty||1;
    document.getElementById('nre-notes').value = n.notes||'';
    document.getElementById('nre-stage').value = n.stage||'';
  } else {
    ['nre-desc','nre-supplier','nre-cost','nre-po-number','nre-due','nre-notes'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('nre-category').value='Stencil';
    document.getElementById('nre-currency').value='THB';
    document.getElementById('nre-po-status').value='no-po';
    document.getElementById('nre-qty').value=1;
    document.getElementById('nre-stage').value='';
  }
  document.getElementById('nre-modal').classList.remove('hidden');
}
function closeNREModal() { document.getElementById('nre-modal').classList.add('hidden'); editingNreId=null; }
function saveNREItem() {
  const desc = document.getElementById('nre-desc').value.trim();
  if (!desc) { alert('Description required'); return; }
  if (!currentProject.nreItems) currentProject.nreItems = [];
  const linkedTasks = [...document.querySelectorAll('#nre-task-pills .selected')].map(el=>parseInt(el.dataset.tid));
  const data = {
    category: document.getElementById('nre-category').value,
    desc,
    supplier: document.getElementById('nre-supplier').value.trim()||'TBD',
    cost: parseFloat(document.getElementById('nre-cost').value)||0,
    currency: document.getElementById('nre-currency').value,
    poStatus: document.getElementById('nre-po-status').value,
    poNumber: document.getElementById('nre-po-number').value.trim(),
    due: document.getElementById('nre-due').value,
    qty: parseInt(document.getElementById('nre-qty').value)||1,
    notes: document.getElementById('nre-notes').value.trim(),
    linkedTasks,
    stage: document.getElementById('nre-stage').value,
  };
  if (editingNreId) Object.assign(currentProject.nreItems.find(n=>n.id==editingNreId), data);
  else { const maxId=Math.max(0,...currentProject.nreItems.map(n=>n.id)); currentProject.nreItems.push({id:maxId+1,...data}); }
  closeNREModal(); updateNREBadge(); renderProjectDetail();
}
function deleteNREItem(id) {
  if (!confirm('Delete this NRE item?')) return;
  currentProject.nreItems = currentProject.nreItems.filter(n=>n.id!==id);
  updateNREBadge(); renderProjectDetail();
}

function openIssueModal(issueId=null) {
  editingIssueId = issueId;

  // Populate task pills
  const existing = issueId ? (currentProject.issues.find(i=>i.id==issueId)||{}).linkedTasks||[] : [];

function deleteIssue(id) {

function closeProjectModal() { document.getElementById('project-modal').classList.add('hidden'); }

// ══════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════
function switchViewTo(view) {
  currentView = view;
  document.querySelectorAll('.tab-btn').forEach(b => {
    const v = b.getAttribute('onclick')||'';
    b.classList.toggle('active', v.includes(`'${view}'`));
  });
  updateTopbarButtons(); updateIssuesBadge(); updateNREBadge(); renderProjectDetail();
}
function getMonday(d) { const dt=new Date(d),day=dt.getDay(),diff=dt.getDate()-day+(day===0?-6:1); dt.setDate(diff); dt.setHours(0,0,0,0); return dt; }
function getISOWeek(d) { const dt=new Date(d); dt.setHours(0,0,0,0); dt.setDate(dt.getDate()+3-(dt.getDay()+6)%7); const w1=new Date(dt.getFullYear(),0,4); return 1+Math.round(((dt-w1)/86400000-3+(w1.getDay()+6)%7)/7); }
function fmtDate(d) { if(!d) return '—'; return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtDateShort(d) { return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short'}); }

// Close modals on overlay click
['task-modal','member-modal','issue-modal','stage-modal','nre-modal','project-modal'].forEach(id =>
  document.getElementById(id).addEventListener('click', function(e){ if(e.target===this) this.classList.add('hidden'); })
);
