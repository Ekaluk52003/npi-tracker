<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Critical Index Board — Mockup</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
/* ── Theme ─────────────────────────────────────────────────────── */
:root, [data-theme="dark"] {
  --bg: #0a0a0a; --surface: #121212; --surface2: #1a1a1a; --border: #282828;
  --text: #f5f5f5; --text-muted: #999999;
  --accent: #34B27B; --accent-hover: #2d9b6e;
  --danger: #cc3333; --success: #34B27B; --warning: #b8860b;
}
[data-theme="light"] {
  --bg: #fafafa; --surface: #ffffff; --surface2: #f5f5f5; --border: #e8e8e8;
  --text: #1a1a1a; --text-muted: #666666;
  --accent: #34B27B; --accent-hover: #2d9b6e;
  --danger: #cc3333; --success: #34B27B; --warning: #b8860b;
}
[x-cloak] { display: none !important; }

body {
  font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text); margin: 0; padding: 0;
}

/* ── Topbar ────────────────────────────────────────────────────── */
.topbar {
  position: sticky; top: 0; z-index: 30;
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0.625rem 1rem; display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;
}
.tab-btn {
  display: inline-flex; align-items: center; gap: 0.25rem;
  padding: 0.5rem 1rem; font-size: 0.85rem; font-weight: 500;
  color: var(--text-muted); border-bottom: 2px solid transparent; white-space: nowrap;
  transition: all 0.2s; text-decoration: none; background: transparent; cursor: pointer;
}
.tab-btn:hover { color: var(--text); border-bottom-color: var(--text-muted); }
.tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }

/* ── Toolbar ───────────────────────────────────────────────────── */
.toolbar {
  display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 0;
  flex-wrap: wrap; border-bottom: 1px solid var(--border);
  margin: 0 0; padding-left: 1rem; padding-right: 1rem;
  background: var(--surface);
}
.filter-btn {
  display: inline-flex; align-items: center; gap: 0.375rem;
  padding: 0.35rem 0.65rem; font-size: 0.7rem; font-weight: 500;
  color: var(--text-muted); background: transparent; border: 1px solid var(--border);
  border-radius: 0.375rem; cursor: pointer; transition: all 0.15s;
}
.filter-btn:hover { border-color: var(--text-muted); color: var(--text); }
.filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(52,178,123,0.08); }
.view-toggle {
  display: inline-flex; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 0.375rem; overflow: hidden;
}
.view-toggle button {
  padding: 0.35rem 0.65rem; font-size: 0.7rem; font-weight: 500;
  color: var(--text-muted); background: transparent; border: none; cursor: pointer;
  transition: all 0.15s;
}
.view-toggle button.active { background: var(--accent); color: #fff; }
.view-toggle button:hover:not(.active) { color: var(--text); }

/* ── Calendar Board ────────────────────────────────────────────── */
.board-wrap {
  overflow-x: auto; overflow-y: hidden;
}
.board-wrap::-webkit-scrollbar { height: 6px; }
.board-wrap::-webkit-scrollbar-track { background: var(--bg); }
.board-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Stage header band across top */
.stage-band {
  display: flex; position: sticky; top: 0; z-index: 10;
}
.stage-band-cell {
  display: flex; align-items: center; justify-content: center; gap: 0.5rem;
  padding: 0.5rem 0; font-size: 0.7rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.6px;
  border-bottom: 2px solid; border-right: 1px solid var(--border);
  background: var(--surface);
}
.stage-band-cell:last-child { border-right: none; }

/* Column grid — no gaps, shared borders like a calendar */
.board-grid {
  display: flex; align-items: stretch;
  min-height: calc(100vh - 180px);
}
.col {
  flex: 0 0 280px; min-width: 280px;
  background: var(--bg);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
}
.col:last-child { border-right: none; }

/* Unlinked col */
.col-unlinked { background: rgba(245,158,11,0.02); }

/* Column header — sits right under the stage band */
.col-header {
  padding: 0.625rem 0.625rem 0.5rem;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.col-body {
  padding: 0.375rem; flex: 1; overflow-y: auto;
  min-height: 80px;
}
.col-body::-webkit-scrollbar { width: 3px; }
.col-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Drop zone highlight */
.col-body.drag-over {
  background: rgba(52,178,123,0.06);
  box-shadow: inset 0 0 0 2px var(--accent);
}

/* ── CIS Normalized Score (1-5) ────────────────────────────────── */
.cis-dots {
  display: inline-flex; gap: 3px; align-items: center;
}
.cis-dot {
  width: 8px; height: 8px; border-radius: 2px; transition: background 0.2s;
}

/* ── Issue Card ────────────────────────────────────────────────── */
.issue-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 0.375rem;
  padding: 0.5rem 0.5rem 0.5rem 0.625rem; margin-bottom: 0.375rem; cursor: grab;
  transition: all 0.12s; position: relative; border-left: 3px solid transparent;
}
.issue-card:hover { border-color: var(--text-muted); border-left-color: inherit;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15); transform: translateY(-1px); }
.issue-card:active { cursor: grabbing; }
.issue-card.dragging { opacity: 0.35; transform: scale(0.95); }

.sev-critical-border { border-left-color: #ef4444 !important; }
.sev-high-border     { border-left-color: #f59e0b !important; }
.sev-medium-border   { border-left-color: #34B27B !important; }
.sev-low-border      { border-left-color: #6b7280 !important; }

.sev-pill {
  display: inline-flex; align-items: center; padding: 0.1rem 0.4rem;
  font-size: 0.6rem; font-weight: 700; border-radius: 0.2rem;
  text-transform: uppercase; letter-spacing: 0.3px;
}
.sev-pill-critical { background: rgba(239,68,68,0.15); color: #ef4444; }
.sev-pill-high     { background: rgba(245,158,11,0.15); color: #f59e0b; }
.sev-pill-medium   { background: rgba(52,178,123,0.15); color: #34B27B; }
.sev-pill-low      { background: rgba(107,114,128,0.15); color: #9ca3af; }

.st-dot { width: 5px; height: 5px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.st-open { background: var(--text-muted); }
.st-inprogress { background: var(--accent); }
.st-blocked { background: var(--danger); }
.st-investigating { background: var(--warning); }

/* ── Add issue button ──────────────────────────────────────────── */
.col-footer {
  padding: 0.375rem; border-top: 1px solid var(--border); background: var(--surface);
}
.add-btn {
  display: flex; align-items: center; justify-content: center; gap: 0.25rem;
  width: 100%; padding: 0.375rem; font-size: 0.7rem; font-weight: 500;
  color: var(--text-muted); background: transparent; border: 1px dashed var(--border);
  border-radius: 0.25rem; cursor: pointer; transition: all 0.15s;
}
.add-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── Theme ─────────────────────────────────────────────────────── */
.theme-btn {
  padding: 0.5rem; border-radius: 0.5rem; background: transparent; border: none;
  color: var(--text-muted); cursor: pointer;
}
.theme-btn:hover { background: var(--surface2); }

/* ── Toast ─────────────────────────────────────────────────────── */
.toast-bar {
  position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
  background: var(--surface); border: 1px solid var(--accent); border-radius: 0.5rem;
  padding: 0.6rem 1rem; font-size: 0.8rem; color: var(--accent);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3); z-index: 100;
  display: flex; align-items: center; gap: 0.5rem;
}
</style>
</head>

<body x-data="board()" x-init="init()">

<!-- ── Topbar ──────────────────────────────────────────────────── -->
<header class="topbar">
  <h1 style="font-size:1rem;font-weight:600;">
    <span style="color:var(--text-muted)">Projects</span>
    <span style="color:var(--text-muted);margin:0 0.25rem">/</span>
    <span style="color:#4f9cf7">Smart Thermostat v2</span>
  </h1>
  <nav style="display:flex;align-items:center;gap:0.25rem;margin-left:0.5rem;overflow-x:auto;">
    <span class="tab-btn">Gantt</span>
    <span class="tab-btn">Task List</span>
    <span class="tab-btn">Milestones</span>
    <span class="tab-btn">Build Stages</span>
    <span class="tab-btn">Issues<span style="margin-left:0.25rem;font-size:10px;background:rgba(239,68,68,0.2);color:#ef4444;border-radius:9999px;padding:0.125rem 0.375rem">5</span></span>
    <span class="tab-btn active">Critical Index</span>
    <span class="tab-btn">History</span>
  </nav>
  <div style="flex:1"></div>
  <button class="theme-btn" onclick="let t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',t);">
    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
  </button>
</header>

<!-- ── Toolbar ─────────────────────────────────────────────────── -->
<div class="toolbar">
  <div class="view-toggle">
    <button class="active" title="Board view">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="10" rx="1"/></svg>
    </button>
    <button title="Table view">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>
  </div>

  <div style="width:1px;height:1rem;background:var(--border);"></div>

  <span style="font-size:0.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;">Severity:</span>
  <button class="filter-btn" :class="{ active: filters.critical }" @click="filters.critical = !filters.critical">
    <span style="width:7px;height:7px;border-radius:2px;background:#ef4444;"></span> Critical
  </button>
  <button class="filter-btn" :class="{ active: filters.high }" @click="filters.high = !filters.high">
    <span style="width:7px;height:7px;border-radius:2px;background:#f59e0b;"></span> High
  </button>
  <button class="filter-btn" :class="{ active: filters.medium }" @click="filters.medium = !filters.medium">
    <span style="width:7px;height:7px;border-radius:2px;background:#34B27B;"></span> Medium
  </button>
  <button class="filter-btn" :class="{ active: filters.low }" @click="filters.low = !filters.low">
    <span style="width:7px;height:7px;border-radius:2px;background:#6b7280;"></span> Low
  </button>

  <div style="flex:1"></div>

  <!-- Legend -->
  <div style="display:flex;align-items:center;gap:0.75rem;font-size:0.65rem;color:var(--text-muted);">
    <span>CIS 1-5 (normalized per stage):</span>
    <span style="display:inline-flex;gap:2px;">
      <span style="width:8px;height:8px;border-radius:2px;background:#34B27B;"></span>
      <span style="width:8px;height:8px;border-radius:2px;background:#a3e635;"></span>
      <span style="width:8px;height:8px;border-radius:2px;background:#eab308;"></span>
      <span style="width:8px;height:8px;border-radius:2px;background:#f59e0b;"></span>
      <span style="width:8px;height:8px;border-radius:2px;background:#ef4444;"></span>
    </span>
    <span>Low &rarr; High</span>

    <div style="width:1px;height:1rem;background:var(--border);"></div>
    <span><strong style="color:var(--text);" x-text="totalIssues"></strong> issues</span>
    <span><strong style="color:#f59e0b;" x-text="unlinkedCount"></strong> unlinked</span>
  </div>
</div>

<!-- ── Board ───────────────────────────────────────────────────── -->
<div class="board-wrap">

  <!-- Stage header band -->
  <div class="stage-band">
    <!-- Unlinked -->
    <div class="stage-band-cell" style="flex:0 0 240px;min-width:240px;border-bottom-color:#f59e0b;color:#f59e0b;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v2m0 4h.01M12 2a10 10 0 100 20 10 10 0 000-20z"/></svg>
      Unlinked
    </div>
    <!-- Stage groups -->
    <template x-for="sg in stageGroups" :key="sg.stage">
      <div class="stage-band-cell"
           :style="'flex:0 0 ' + (sg.count * 280) + 'px; min-width:' + (sg.count * 280) + 'px; border-bottom-color:' + sg.color + '; color:' + sg.color + ';'">
        <span x-text="sg.stage"></span>
        <span style="font-size:0.6rem;font-weight:500;opacity:0.6;" x-text="sg.count + ' tasks'"></span>
      </div>
    </template>
  </div>

  <!-- Column grid -->
  <div class="board-grid">

    <!-- ── Unlinked Column ──────────────────────────────────── -->
    <div class="col col-unlinked" style="flex:0 0 240px;min-width:240px;">
      <div class="col-header">
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <span style="font-size:0.8rem;font-weight:600;color:#f59e0b;">Inbox</span>
          <span style="font-size:0.65rem;color:var(--text-muted);background:rgba(245,158,11,0.1);padding:0.1rem 0.4rem;border-radius:9999px;" x-text="unlinkedCount"></span>
        </div>
        <div style="font-size:0.65rem;color:var(--text-muted);margin-top:0.125rem;">Drag to a task to link</div>
      </div>
      <div class="col-body"
           @dragover.prevent="$el.classList.add('drag-over')"
           @dragleave="$el.classList.remove('drag-over')"
           @drop.prevent="dropIssue('unlinked', $event); $el.classList.remove('drag-over')">
        <template x-for="issue in getUnlinkedIssues()" :key="issue.id">
          <div class="issue-card"
               :class="'sev-' + issue.severity + '-border'"
               :draggable="true"
               @dragstart="startDrag(issue, 'unlinked', $event)"
               @dragend="endDrag($event)"
               x-show="isVisible(issue)">
            <div style="display:flex;align-items:center;gap:0.375rem;margin-bottom:0.25rem;">
              <span class="sev-pill" :class="'sev-pill-' + issue.severity" x-text="issue.severity"></span>
              <span :class="'st-dot st-' + issue.status"></span>
            </div>
            <div style="font-size:0.75rem;font-weight:500;line-height:1.35;margin-bottom:0.375rem;" x-text="issue.title"></div>
            <div style="display:flex;align-items:center;justify-content:space-between;font-size:0.65rem;color:var(--text-muted);">
              <span x-text="issue.owner"></span>
              <span :style="issue.overdue ? 'color:#ef4444' : ''" x-text="issue.due"></span>
            </div>
          </div>
        </template>
        <div x-show="getUnlinkedIssues().length === 0" style="padding:1.5rem 0.5rem;text-align:center;font-size:0.7rem;color:var(--text-muted);">
          No unlinked issues
        </div>
      </div>
    </div>

    <!-- ── Task Columns ─────────────────────────────────────── -->
    <template x-for="task in tasks" :key="task.id">
      <div class="col">
        <div class="col-header">
          <!-- Row 1: CIS score dots + issue count -->
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.375rem;">
            <div style="display:flex;align-items:center;gap:0.5rem;">
              <!-- CIS 1-5 dots -->
              <div class="cis-dots" :title="'CIS ' + task.cis + '/5 (raw: ' + task.score + ')'">
                <template x-for="i in 5" :key="i">
                  <div class="cis-dot" :style="'background:' + (i <= task.cis ? cisColor(task.cis) : 'var(--border)')"></div>
                </template>
              </div>
              <span style="font-size:0.7rem;font-weight:700;" :style="'color:' + cisColor(task.cis)" x-text="task.cis + '/5'"></span>
            </div>
            <span style="font-size:0.65rem;color:var(--text-muted);background:var(--surface2);padding:0.1rem 0.4rem;border-radius:9999px;"
                  x-text="getTaskIssues(task.id).length"></span>
          </div>
          <!-- Row 2: Task name -->
          <div style="font-size:0.8rem;font-weight:600;line-height:1.3;margin-bottom:0.25rem;" x-text="task.name"></div>
          <!-- Row 3: Meta -->
          <div style="display:flex;align-items:center;gap:0.375rem;flex-wrap:wrap;font-size:0.6rem;">
            <span style="color:var(--text-muted);" x-text="task.section"></span>
            <span style="margin-left:auto;" :class="'st-dot st-' + task.status"></span>
            <span style="text-transform:capitalize;" :style="task.status==='blocked'?'color:var(--danger)':'color:var(--text-muted)'" x-text="task.status"></span>
          </div>
          <!-- Row 4: breakdown -->
          <div style="display:flex;gap:0.5rem;margin-top:0.375rem;padding-top:0.375rem;border-top:1px solid var(--border);font-size:0.6rem;color:var(--text-muted);">
            <span>d=<strong style="color:var(--text);" x-text="task.d"></strong></span>
            <span>p=<strong style="color:var(--text);" x-text="task.p"></strong></span>
            <span>t=<strong style="color:var(--text);" x-text="task.t + 'd'"></strong></span>
            <span style="margin-left:auto;" x-text="task.who"></span>
          </div>
        </div>

        <!-- Droppable body -->
        <div class="col-body"
             @dragover.prevent="$el.classList.add('drag-over')"
             @dragleave="$el.classList.remove('drag-over')"
             @drop.prevent="dropIssue(task.id, $event); $el.classList.remove('drag-over')">

          <template x-for="issue in getTaskIssues(task.id)" :key="issue.id">
            <div class="issue-card"
                 :class="'sev-' + issue.severity + '-border'"
                 :draggable="true"
                 @dragstart="startDrag(issue, task.id, $event)"
                 @dragend="endDrag($event)"
                 x-show="isVisible(issue)">
              <div style="display:flex;align-items:center;gap:0.375rem;margin-bottom:0.25rem;">
                <span class="sev-pill" :class="'sev-pill-' + issue.severity" x-text="issue.severity"></span>
                <span :class="'st-dot st-' + issue.status"></span>
                <span style="font-size:0.6rem;color:var(--text-muted);text-transform:capitalize;" x-text="issue.status"></span>
              </div>
              <div style="font-size:0.75rem;font-weight:500;line-height:1.35;margin-bottom:0.375rem;" x-text="issue.title"></div>
              <div style="display:flex;align-items:center;justify-content:space-between;font-size:0.65rem;color:var(--text-muted);">
                <span x-text="issue.owner"></span>
                <span :style="issue.overdue ? 'color:#ef4444' : ''" x-text="issue.due"></span>
              </div>
            </div>
          </template>

          <div x-show="getTaskIssues(task.id).length === 0"
               style="padding:1rem 0.5rem;text-align:center;font-size:0.65rem;color:var(--text-muted);border:1px dashed var(--border);border-radius:0.25rem;margin:0.25rem;">
            Drop issues here
          </div>
        </div>

        <!-- Footer -->
        <div class="col-footer">
          <button class="add-btn">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
            Issue
          </button>
        </div>
      </div>
    </template>

  </div>
</div>

<!-- ── Toast ───────────────────────────────────────────────────── -->
<div class="toast-bar" x-show="toast" x-cloak x-transition>
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
  <span x-text="toast"></span>
</div>

<script>
function board() {
  return {
    dragData: null,
    dragSource: null,
    toast: '',
    filters: { critical: false, high: false, medium: false, low: false },

    // Raw scores — CIS will be normalized per stage in init()
    tasks: [
      { id: 1, name: 'PCBA Layout & Routing',               section: 'Pre-req: Main PCBA',   stage: 'EVT', stageColor: '#4f9cf7', status: 'inprogress', who: 'EE Team',    d: 5, p: 12, t: 14, score: 60, cis: 0 },
      { id: 2, name: 'Firmware Core Bring-up',               section: 'Firmware',              stage: 'EVT', stageColor: '#4f9cf7', status: 'blocked',    who: 'FW Team',    d: 4, p: 9,  t: 10, score: 45, cis: 0 },
      { id: 3, name: 'Thermal Simulation',                   section: 'Pre-req: Main PCBA',   stage: 'EVT', stageColor: '#4f9cf7', status: 'open',       who: 'EE Team',    d: 3, p: 6,  t: 7,  score: 31, cis: 0 },
      { id: 4, name: 'SMT Assembly — EVT',                   section: 'Assembly',              stage: 'EVT', stageColor: '#4f9cf7', status: 'open',       who: 'CM Partner', d: 2, p: 5,  t: 5,  score: 24, cis: 0 },
      { id: 5, name: 'WiFi/BLE Antenna Tuning',              section: 'RF',                    stage: 'EVT', stageColor: '#4f9cf7', status: 'blocked',    who: 'RF Lab',     d: 2, p: 4,  t: 7,  score: 23, cis: 0 },
      { id: 6, name: 'Power Supply Validation',              section: 'Pre-req: Main PCBA',   stage: 'EVT', stageColor: '#4f9cf7', status: 'inprogress', who: 'EE Team',    d: 1, p: 3,  t: 5,  score: 16, cis: 0 },
      { id: 7, name: 'Injection Mold — Top Shell',           section: 'Tooling',               stage: 'DVT', stageColor: '#a855f7', status: 'inprogress', who: 'Vendor A',   d: 3, p: 7,  t: 21, score: 48, cis: 0 },

    issues: [
      { id: 101, title: 'Signal integrity failure on high-speed USB traces',     severity: 'critical', status: 'open',          owner: 'John',       due: '18 Apr', overdue: true,  taskId: 1 },

    stageGroups: [],

    init() {
      this.normalizeCIS();
      // Sort tasks: by stage order then CIS desc
      const stageOrder = { EVT: 0, DVT: 1, PVT: 2, MP: 3 };
      this.tasks.sort((a, b) => {
        const so = (stageOrder[a.stage] ?? 99) - (stageOrder[b.stage] ?? 99);
        if (so !== 0) return so;
        return b.cis - a.cis || b.score - a.score;
      });

      // Build stage groups for the header band
      const groups = [];
      let prev = null;
      for (const t of this.tasks) {
        if (t.stage !== prev) {
          groups.push({ stage: t.stage, color: t.stageColor, count: 1 });
          prev = t.stage;
        } else {
          groups[groups.length - 1].count++;
        }
      }
      this.stageGroups = groups;
    },

    normalizeCIS() {
      // Group by stage
      const byStage = {};
      for (const t of this.tasks) {
        if (!byStage[t.stage]) byStage[t.stage] = [];
        byStage[t.stage].push(t);
      }
      // Normalize each stage independently to 1-5
      for (const stage in byStage) {
        const group = byStage[stage];
        const scores = group.map(t => t.score);
        const min = Math.min(...scores);
        const max = Math.max(...scores);
        for (const t of group) {
          if (max === min) {
            t.cis = 3; // all equal → middle
          } else {
            // Linear map to 1-5, rounded
            t.cis = Math.round(1 + ((t.score - min) / (max - min)) * 4);
          }
        }
      }
    },

    cisColor(cis) {
      const colors = { 1: '#34B27B', 2: '#a3e635', 3: '#eab308', 4: '#f59e0b', 5: '#ef4444' };
      return colors[cis] || '#999';
    },

    get totalIssues() { return this.issues.length; },
    get unlinkedCount() { return this.issues.filter(i => !i.taskId).length; },
    get anyFilter() { return this.filters.critical || this.filters.high || this.filters.medium || this.filters.low; },

    isVisible(issue) {
      if (!this.anyFilter) return true;
      return this.filters[issue.severity];
    },
    getTaskIssues(taskId) { return this.issues.filter(i => i.taskId === taskId); },
    getUnlinkedIssues()   { return this.issues.filter(i => !i.taskId); },

    startDrag(issue, source, event) {
      this.dragData = issue;
      this.dragSource = source;
      event.target.closest('.issue-card').classList.add('dragging');
      event.dataTransfer.effectAllowed = 'move';
      event.dataTransfer.setData('text/plain', issue.id);
    },
    endDrag(event) {
      event.target.closest('.issue-card')?.classList.remove('dragging');
    },
    dropIssue(targetTaskId, event) {
      if (!this.dragData) return;
      const issue = this.dragData;
      if (targetTaskId === 'unlinked') {
        if (issue.taskId !== null) {
          const from = this.tasks.find(t => t.id === issue.taskId);
          issue.taskId = null;
          this.showToast('Unlinked from "' + (from?.name || 'task') + '"');
        }
      } else {
        if (issue.taskId !== targetTaskId) {
          const to = this.tasks.find(t => t.id === targetTaskId);
          issue.taskId = targetTaskId;
          this.showToast('Linked to "' + (to?.name || 'task') + '"');
        }
      }
      this.dragData = null;
      this.dragSource = null;
    },
    showToast(msg) {
      this.toast = msg;
      setTimeout(() => { this.toast = ''; }, 2500);
    }
  }
}
