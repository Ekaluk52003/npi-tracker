<div x-data="projectForm({% if is_edit %}true{% else %}false{% endif %})" x-show="open" x-cloak
     class="fixed inset-0 z-[100] flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="open = false; document.getElementById('modal-container').innerHTML=''"></div>
    <div class="relative bg-[var(--surface)] rounded-xl border border-[var(--border)] w-full max-w-lg max-h-[85vh] overflow-y-auto shadow-2xl" @click.stop>
        <div class="sticky top-0 bg-[var(--surface)] border-b border-[var(--border)] px-5 py-4 flex items-center justify-between z-10">
            <h2 class="text-lg font-semibold">{% if is_edit %}Edit Project{% else %}New Project{% endif %}</h2>
            <button @click="open = false; document.getElementById('modal-container').innerHTML=''" class="text-[var(--text-muted)] hover:text-[var(--text)] text-xl">&times;</button>
        </div>
        <form hx-post="{% if is_edit %}{% url 'project-edit' project.pk %}{% else %}{% url 'project-create' %}{% endif %}" hx-target="#modal-container" hx-swap="innerHTML" class="p-5 space-y-4"
              {% if not is_edit %}@submit="$el.querySelector('[name=stages_json]').value = JSON.stringify(stages)"{% endif %}
            {% csrf_token %}
            {% for field in form %}
            <div>
                <label class="block text-xs font-medium text-[var(--text-muted)] mb-1">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<p class="text-red-400 text-xs mt-1">{{ field.errors.0 }}</p>{% endif %}
            </div>
            {% endfor %}

            {% if not is_edit %}
            <!-- Dynamic Stages Builder (only for new projects) -->
            <div class="border-t border-[var(--border)] pt-4">
                <div class="flex items-center justify-between mb-2">
                    <h3 class="text-sm font-semibold">Build Stages</h3>
                    <button type="button" @click="addStage()" class="text-xs text-[var(--accent)] hover:underline">+ Add Stage</button>
                </div>
                <p class="text-[11px] text-[var(--text-muted)] mb-3">Define the build stages for this project. Leave empty to use defaults (ETB, PS, FAS).</p>
                <template x-for="(stage, idx) in stages" :key="idx">
                    <div class="flex items-center gap-2 mb-2">
                        <input type="color" x-model="stage.color" class="w-8 h-8 rounded border border-[var(--border)] cursor-pointer p-0.5 bg-transparent">
                        <input type="text" x-model="stage.name" placeholder="Name (e.g. EVT)"
                               class="flex-1 bg-[var(--surface2)] border border-[var(--border)] rounded-md px-2 py-1.5 text-sm text-[var(--text)] focus:border-[var(--accent)] focus:outline-none">
                        <input type="text" x-model="stage.full_name" placeholder="Full name (e.g. Engineering Verification Test)"
                               class="flex-[2] bg-[var(--surface2)] border border-[var(--border)] rounded-md px-2 py-1.5 text-sm text-[var(--text)] focus:border-[var(--accent)] focus:outline-none">
                        <button type="button" @click="stages.splice(idx, 1)" class="text-red-400 hover:text-red-300 text-lg px-1">&times;</button>
                    </div>
                </template>
                <input type="hidden" name="stages_json" value="">
            </div>
            {% endif %}

            <div class="flex justify-end gap-2 pt-3 border-t border-[var(--border)]">
                <button type="button" @click="open = false; document.getElementById('modal-container').innerHTML=''" class="btn-secondary">Cancel</button>
                <button type="submit" class="action-btn">{% if is_edit %}Save Changes{% else %}Create Project{% endif %}</button>
            </div>
        </form>
    </div>
</div>

<script>
function projectForm(isEdit) {
    return {
        open: true,
        stages: isEdit ? [] : [
            { name: 'ETB', full_name: 'External Test Build', color: '#f59e0b' },
            { name: 'PS', full_name: 'Pre-Series Build', color: '#8b5cf6' },
            { name: 'FAS', full_name: 'First Article Sample', color: '#06b6d4' },
        ],
        addStage() {
            const colors = ['#f59e0b', '#8b5cf6', '#06b6d4', '#ef4444', '#22c55e', '#ec4899', '#14b8a6', '#f97316'];
            this.stages.push({ name: '', full_name: '', color: colors[this.stages.length % colors.length] });
        },
    };
}
</script>
