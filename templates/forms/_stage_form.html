<div x-data="{ open: true }" x-show="open" x-cloak
     class="fixed inset-0 z-[100] flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="open = false; document.getElementById('modal-container').innerHTML=''"></div>
    <div class="relative bg-[var(--surface)] rounded-xl border border-[var(--border)] w-full max-w-lg max-h-[85vh] overflow-y-auto shadow-2xl" @click.stop>
        <div class="sticky top-0 bg-[var(--surface)] border-b border-[var(--border)] px-5 py-4 flex items-center justify-between z-10">
            <h2 class="text-lg font-semibold">{% if is_new %}New Stage{% else %}Edit {{ stage.name }} — {{ stage.full_name }}{% endif %}</h2>
            <button @click="open = false; document.getElementById('modal-container').innerHTML=''" class="text-[var(--text-muted)] hover:text-[var(--text)] text-xl">&times;</button>
        </div>
        <form hx-post="{% if is_new %}{% url 'stage-create' project.pk %}{% else %}{% url 'stage-edit' project.pk stage.pk %}{% endif %}"
              hx-target="#modal-container" hx-swap="innerHTML" class="p-5 space-y-4">
            {% csrf_token %}
            {% for field in form %}
            <div>
                <label class="block text-xs font-medium text-[var(--text-muted)] mb-1">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<p class="text-red-400 text-xs mt-1">{{ field.errors.0 }}</p>{% endif %}
            </div>
            {% endfor %}

            {% if not is_new %}
            {% include 'forms/_gate_checklist_partial.html' %}
            {% endif %}

            <div class="flex justify-end gap-2 pt-3 border-t border-[var(--border)]">
                <button type="button" @click="open = false; document.getElementById('modal-container').innerHTML=''" class="btn-secondary">Cancel</button>
                <button type="submit" class="action-btn">{% if is_new %}Create Stage{% else %}Save Stage{% endif %}</button>
            </div>
        </form>
    </div>
</div>
