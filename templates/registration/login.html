{% load django_vite %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — NPI Tracker</title>
    <style>[x-cloak] { display: none !important; }</style>
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('npi-theme') || 'dark')</script>
    {% vite_hmr_client %}
    {% vite_asset 'static/src/main.js' %}
</head>
<body class="bg-[var(--bg)] text-[var(--text)] min-h-screen flex items-center justify-center">

<div class="w-full max-w-sm px-4">
    <div class="mb-8 text-center">
        <h1 class="text-2xl font-bold text-[var(--accent)]">NPI Tracker</h1>
        <p class="mt-1 text-sm text-[var(--text-muted)]">Sign in to your account</p>
    </div>

    <div class="bg-[var(--surface)] border border-[var(--border)] rounded-xl p-6 shadow-lg">
        {% if form.errors %}
        <div class="mb-4 rounded-lg bg-red-500/10 border border-red-500/30 px-4 py-3 text-sm text-red-400">
            Invalid username or password. Please try again.
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">

            <div class="mb-4">
                <label for="id_username" class="block text-xs font-medium text-[var(--text-muted)] mb-1.5 uppercase tracking-wider">Username</label>
                <input
                    type="text"
                    id="id_username"
                    name="username"
                    autocomplete="username"
                    autofocus
                    required
                    class="w-full px-3 py-2 rounded-lg bg-[var(--bg)] border border-[var(--border)] text-[var(--text)] text-sm placeholder-[var(--text-muted)] focus:outline-none focus:border-[var(--accent)] transition"
                >
            </div>

            <div class="mb-6">
                <label for="id_password" class="block text-xs font-medium text-[var(--text-muted)] mb-1.5 uppercase tracking-wider">Password</label>
                <input
                    type="password"
                    id="id_password"
                    name="password"
                    autocomplete="current-password"
                    required
                    class="w-full px-3 py-2 rounded-lg bg-[var(--bg)] border border-[var(--border)] text-[var(--text)] text-sm placeholder-[var(--text-muted)] focus:outline-none focus:border-[var(--accent)] transition"
                >
            </div>

            <button type="submit"
                    class="w-full py-2.5 px-4 rounded-lg bg-[var(--accent)] text-white text-sm font-medium hover:opacity-90 transition">
                Sign in
            </button>
        </form>
    </div>
</div>

</body>
</html>
