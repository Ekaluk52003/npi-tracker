<div class="flex items-center gap-2 mb-4">
    <label class="text-xs text-[var(--text-muted)] font-medium">Stage:</label>
    <select class="text-xs bg-[var(--surface2)] border border-[var(--border)] rounded-md px-2 py-1.5 text-[var(--text)]"
            hx-get="{% if active_tab == 'gantt' %}{% url 'project-gantt' project.pk %}{% elif active_tab == 'list' %}{% url 'project-list' project.pk %}{% else %}{% url 'project-milestones' project.pk %}{% endif %}"
            hx-target="#content" hx-swap="innerHTML" hx-push-url="true" name="stage">
        <option value="" {% if not stage_filter %}selected{% endif %}>All Stages</option>
        {% for s in project_stages %}
        <option value="{{ s.pk }}" {% if stage_filter == s.pk|stringformat:"d" %}selected{% endif %}>{{ s.name }}</option>
        {% endfor %}
    </select>
</div>
