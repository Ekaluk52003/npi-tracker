{% load django_vite %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NPI Tracker{% endblock %}</title>
    <style>[x-cloak] { display: none !important; } html { scroll-behavior: smooth; }</style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('npi-theme') || 'dark')</script>
    {% vite_hmr_client %}
    {% vite_asset 'static/src/main.js' %}
</head>
<body class="bg-[var(--bg)] text-[var(--text)] min-h-screen"
      x-data="{ sidebarOpen: false, sidebarCollapsed: localStorage.getItem('npi-sidebar-collapsed') === 'true' }"
      x-effect="localStorage.setItem('npi-sidebar-collapsed', sidebarCollapsed)"
      x-cloak>

<div class="flex min-h-screen">
    {% include "components/sidebar.html" %}

    <div class="flex-1 flex flex-col min-w-0 ml-0 transition-[margin] duration-200"
         :class="sidebarCollapsed ? 'lg:ml-[56px]' : 'lg:ml-[220px]'">
        {% include "components/topbar.html" %}

        <main class="flex-1 p-4 lg:p-6 overflow-auto" id="main-content">
            <div id="content">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
</div>

<div id="modal-container"></div>

<!-- Global toast notification -->
<div x-data="{
        show: false,
        message: '',
        type: 'success',
        timer: null,
        trigger(msg, type) {
            this.message = msg;
            this.type = type || 'success';
            this.show = true;
            clearTimeout(this.timer);
            this.timer = setTimeout(() => this.show = false, 3500);
        }
     }"
     @show-toast.window="trigger($event.detail.message, $event.detail.type)"
     x-show="show"
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="opacity-0 translate-y-2"
     x-transition:enter-end="opacity-100 translate-y-0"
     x-transition:leave="transition ease-in duration-150"
     x-transition:leave-start="opacity-100 translate-y-0"
     x-transition:leave-end="opacity-0 translate-y-2"
     x-cloak
     class="fixed bottom-6 right-6 z-[200] flex items-center gap-3 px-4 py-3 rounded-xl shadow-2xl border text-sm font-medium cursor-pointer"
     :class="type === 'success'
         ? 'bg-emerald-950 border-emerald-700 text-emerald-300'
         : 'bg-red-950 border-red-700 text-red-300'"
     @click="show = false">
    <svg x-show="type === 'success'" class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
    </svg>
    <svg x-show="type === 'error'" class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
    </svg>
    <span x-text="message"></span>
</div>

<script>
  document.addEventListener('htmx:configRequest', (e) => {
    const match = document.cookie.match(/csrftoken=([^;]+)/);
    if (match) e.detail.headers['X-CSRFToken'] = match[1];
  });
</script>
</body>
</html>
