{% extends "base.html" %}
{% block title %}Access Denied{% endblock %}
{% block content %}
<div class="flex items-center justify-center min-h-screen">
    <div class="text-center">
        <div class="w-20 h-20 mx-auto mb-6 rounded-full bg-red-500/10 flex items-center justify-center">
            <svg class="w-10 h-10 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>
        </div>
        <h1 class="text-2xl font-bold text-[var(--text)] mb-2">Access Denied</h1>
        <p class="text-[var(--text-muted)] mb-6 max-w-md mx-auto">{{ error_message|default:"You don't have permission to access this resource." }}</p>
        <a href="{% url 'portfolio' %}" class="btn-secondary">← Back to Portfolio</a>
    </div>
</div>
{% endblock %}
